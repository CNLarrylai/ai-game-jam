app = "wasteland-live-ws"
primary_region = "nrt"

[build]

[http_service]
  internal_port = 3002
  force_https = true

[[services]]
  internal_port = 3002
  protocol = "tcp"

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [[services.ports]]
    port = 80
    handlers = ["http"]
