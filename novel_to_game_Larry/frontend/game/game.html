<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>最后的人 · 末日生存</title>
<link rel="stylesheet" href="../doom.css" />
<style>
  /* 游戏专属补充(沿用 doom.css 变量) */
  .scene-card { width: 100%; max-width: 680px; margin: 0 auto 18px; display: flex; flex-direction: column; align-items: center; }
  .scene-emoji { font-size: 64px; line-height: 1; filter: drop-shadow(0 6px 24px oklch(0.05 0.01 250)); opacity: 0; transform: translateY(10px); transition: opacity .8s ease, transform .8s ease; }
  .scene-emoji.in { opacity: .96; transform: none; }
  .node-title { font-family: var(--f-serif); font-weight: 600; font-size: 23px; letter-spacing: 1px; color: var(--fog); margin: 14px 0 4px; text-align: center; }
  .node-chip { font-family: var(--f-stamp); font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--fog-dim); }
  .desc { font-family: var(--f-serif); font-size: 17px; line-height: 1.7; color: var(--fog-soft); text-align: center; max-width: 600px; margin: 0 auto 22px; }
  /* 观众投票条 */
  .aud-vote { display: flex; align-items: center; gap: 8px; margin-top: 7px; }
  .aud-bar { flex: 1; height: 4px; border-radius: 2px; background: oklch(0.3 0.015 250); overflow: hidden; }
  .aud-bar i { display: block; height: 100%; background: linear-gradient(90deg, var(--cyan-deep), var(--cyan)); transition: width .6s ease; }
  .aud-pct { font-family: var(--f-stamp); font-size: 10px; color: var(--fog-dim); min-width: 30px; text-align: right; }
  .choice.fav { box-shadow: inset 3px 0 0 var(--cyan); }
  .choice .fav-tag { font-family: var(--f-stamp); font-size: 9px; letter-spacing: 1px; color: var(--cyan); border: 1px solid var(--cyan-deep); border-radius: 5px; padding: 2px 5px; margin-left: 8px; }
  .aud-hint { text-align: center; font-family: var(--f-stamp); font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--cyan-deep); margin-bottom: 10px; opacity: .8; }
  /* 弹幕 */
  .danmu { position: fixed; left: 0; right: 0; top: 96px; height: 26px; overflow: hidden; pointer-events: none; z-index: 8; opacity: .5; }
  .danmu span { position: absolute; white-space: nowrap; font-size: 12px; color: var(--fog-soft); font-family: var(--f-sans); animation: dmove linear forwards; }
  @keyframes dmove { from { transform: translateX(100vw); } to { transform: translateX(-100%); } }
  /* 金主打赏 toast */
  .donor-toast { position: fixed; left: 50%; bottom: 64px; transform: translateX(-50%); z-index: 25; font-family: var(--f-stamp); font-size: 13px; letter-spacing: 1px; color: oklch(0.85 0.13 80); background: oklch(0.2 0.04 80 / 0.85); border: 1px solid oklch(0.6 0.12 80 / 0.6); padding: 9px 18px; border-radius: 10px; animation: dtoast 2.4s ease forwards; }
  @keyframes dtoast { 0%{opacity:0;transform:translate(-50%,10px);} 14%,80%{opacity:1;transform:translate(-50%,0);} 100%{opacity:0;transform:translate(-50%,-8px);} }
  .rv-bonus { margin-top: 10px; font-family: var(--f-stamp); font-size: 11px; letter-spacing: 1px; color: var(--cyan); }
  .start-btn { margin: 30px auto 0; display: block; font-family: var(--f-stamp); font-size: 14px; letter-spacing: 3px; text-transform: uppercase; color: var(--fog); cursor: pointer; background: transparent; border: 1px solid var(--line); padding: 13px 34px; border-radius: 8px; transition: all .25s; }
  .start-btn:hover { border-color: var(--ember); color: var(--ember); background: oklch(0.25 0.03 50 / 0.2); }
  /* 命脉三卡(开篇规则页) */
  .pillars { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; margin: 4px 0 22px; }
  .pillar { width: 152px; background: linear-gradient(180deg, var(--panel), var(--panel-2)); border: 1px solid var(--line-soft); border-radius: 12px; padding: 16px 12px; text-align: center; }
  .pillar .pe { font-size: 30px; line-height: 1; }
  .pillar .pn { font-family: var(--f-serif); font-weight: 600; font-size: 16px; margin: 8px 0 4px; letter-spacing: 1px; color: var(--fog); }
  .pillar .pm { font-family: var(--f-sans); font-size: 12px; color: var(--fog-dim); line-height: 1.5; }
  .pillar.food .pn { color: var(--wheat); } .pillar.health .pn { color: var(--cyan); } .pillar.morale .pn { color: var(--rust); }
  /* 人物图鉴 */
  .char-link { color: var(--ember); border-bottom: 1px dashed oklch(0.6 0.1 55 / 0.5); cursor: pointer; }
  .char-link:hover { color: var(--fog); border-bottom-color: var(--ember); }
  .cast-btn { position: fixed; top: 28px; left: 30px; z-index: 14; font-family: var(--f-stamp); font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--fog-dim); background: oklch(0.2 0.018 250 / 0.6); border: 1px solid var(--line-soft); border-radius: 8px; padding: 7px 12px; cursor: pointer; }
  .cast-btn:hover { color: var(--fog); border-color: var(--line); }
  .codex-scrim { position: fixed; inset: 0; z-index: 30; background: oklch(0.07 0.01 250 / 0.72); backdrop-filter: blur(2px); }
  .codex-card { position: fixed; left: 50%; top: 50%; transform: translate(-50%,-50%); z-index: 32; width: min(90%,420px); max-height: 84vh; overflow-y: auto; background: linear-gradient(180deg, var(--panel), var(--panel-2)); border: 1px solid var(--line); border-radius: 16px; padding: 24px; box-shadow: 0 50px 100px -40px oklch(0.02 0.01 250); }
  .cc-top { display: flex; gap: 16px; align-items: center; }
  .cc-name { font-family: var(--f-serif); font-weight: 600; font-size: 22px; color: var(--fog); letter-spacing: 1px; }
  .cc-tag { font-family: var(--f-stamp); font-size: 10px; letter-spacing: 1px; text-transform: uppercase; color: var(--ember); margin-top: 5px; }
  .cc-bg { font-family: var(--f-serif); font-size: 14.5px; line-height: 1.75; color: var(--fog-soft); margin: 16px 0; }
  .cc-rel-h { font-family: var(--f-stamp); font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--fog-dim); margin-bottom: 8px; }
  .cc-rel { display: flex; flex-wrap: wrap; gap: 8px; }
  .cc-rel button { font-family: var(--f-sans); font-size: 12.5px; color: var(--fog-soft); background: var(--panel-2); border: 1px solid var(--line-soft); border-radius: 20px; padding: 5px 11px; cursor: pointer; }
  .cc-rel button:hover { border-color: var(--ember); color: var(--fog); }
  .cc-rel button b { color: var(--fog-dim); font-weight: 400; margin-left: 5px; font-size: 11px; }
  .cc-close { margin-top: 18px; width: 100%; font-family: var(--f-stamp); font-size: 12px; letter-spacing: 2px; color: var(--fog-dim); background: transparent; border: 1px solid var(--line-soft); border-radius: 8px; padding: 10px; cursor: pointer; }
  .cc-close:hover { color: var(--fog); }
  .cast-list { display: flex; flex-direction: column; gap: 6px; }
  .cast-list button { text-align: left; font-family: var(--f-serif); font-size: 15px; color: var(--fog-soft); background: var(--panel-2); border: 1px solid var(--line-soft); border-radius: 10px; padding: 10px 14px; cursor: pointer; }
  .cast-list button:hover { border-color: var(--ember); color: var(--fog); }
  .cast-list button span { font-family: var(--f-stamp); font-size: 10px; letter-spacing: 1px; color: var(--fog-dim); margin-left: 8px; }
  /* 顶栏身份条 + 手记 */
  .topleft { display: flex; align-items: center; gap: 14px; }
  .idchip { display: flex; flex-direction: column; align-items: flex-start; gap: 2px; background: oklch(0.2 0.018 250 / 0.6); border: 1px solid var(--line-soft); border-left: 2px solid var(--ember); border-radius: 8px; padding: 6px 13px; cursor: pointer; transition: border-color .2s; }
  .idchip:hover { border-color: var(--ember); }
  .idchip .idwho { font-family: var(--f-stamp); font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--ember); }
  .idchip .idname { font-family: var(--f-serif); font-weight: 600; font-size: 14px; color: var(--fog); letter-spacing: 1px; }
  .jrn-btn { position: fixed; top: 28px; right: 30px; z-index: 14; font-family: var(--f-stamp); font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--fog-dim); background: oklch(0.2 0.018 250 / 0.6); border: 1px solid var(--line-soft); border-radius: 8px; padding: 7px 12px; cursor: pointer; }
  .jrn-btn:hover { color: var(--fog); border-color: var(--line); }
  .jrn-list { display: flex; flex-direction: column; gap: 9px; }
  .jrn-item { font-family: var(--f-serif); font-size: 13px; line-height: 1.55; color: var(--fog-soft); border-left: 2px solid var(--line); padding: 5px 0 5px 12px; }
  .jrn-item b { color: var(--fog); font-weight: 500; }
  .jrn-item .jc { color: var(--ember); }
  .jrn-empty { color: var(--fog-dim); font-size: 13px; font-style: italic; }
</style>
</head>
<body>
<div id="root"></div>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="gamedata.js"></script>
<script src="engine.js"></script>
<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useMemo } = React;
const G = window.GAME, E = window.Engine;

/* ---- seeded rng for stable per-node audience numbers ---- */
function hash(s){ let h=2166136261; for(let i=0;i<s.length;i++){ h^=s.charCodeAt(i); h=Math.imul(h,16777619);} return h>>>0; }
function rng(seed){ return function(){ seed|=0; seed=seed+0x6D2B79F5|0; let t=Math.imul(seed^seed>>>15,1|seed); t=t+Math.imul(t^t>>>7,61|t)^t; return ((t^t>>>14)>>>0)/4294967296; }; }

function choiceTone(ch){ const net=ch.costs.reduce((a,c)=>a+c.d,0); const bigNeg=ch.costs.some(c=>c.d<=-2); return (net>0 && !bigNeg) ? 'good' : 'bad'; }
function audienceVote(node){
  const r=rng(hash(node.id)); const cs=node.choices;
  const w=cs.map(c=>{ const net=c.costs.reduce((a,x)=>a+x.d,0); return Math.max(0.5, 2+net*0.7+(c.risk?-0.8:0.4)+r()*2); });
  const sum=w.reduce((a,b)=>a+b,0);
  const pct=w.map(x=>Math.round(100*x/sum));
  let fav=0; for(let i=1;i<pct.length;i++) if(pct[i]>pct[fav]) fav=i;
  return { pct, favId: cs[fav].id };
}
const DANMU=['撑住啊…','别开那扇门','把孩子护好','这一关稳了','士气要崩了','信你一次','留点粮','别赌','跟着大家走','这波危险'];

/* ---- audio (softened) ---- */
let _ac,_drone;
function ac(){ if(_ac) return _ac; try{_ac=new (window.AudioContext||window.webkitAudioContext)();}catch(e){} return _ac; }
function drone(){ const a=ac(); if(!a||_drone) return; const o1=a.createOscillator(),o2=a.createOscillator(),g=a.createGain(); o1.type='sine';o1.frequency.value=55;o2.type='sine';o2.frequency.value=82.5;g.gain.value=0;o1.connect(g);o2.connect(g);g.connect(a.destination);o1.start();o2.start();g.gain.linearRampToValueAtTime(0.045,a.currentTime+3);_drone={g,a}; }
function setMute(m){ if(_drone) _drone.g.gain.linearRampToValueAtTime(m?0:0.045,_drone.a.currentTime+0.4); }
function sfx(t){ const a=ac(); if(!a) return; if(a.state==='suspended')a.resume(); const n=a.currentTime; const tone=(f,t0,d,v,w)=>{const o=a.createOscillator(),g=a.createGain();o.type=w||'sine';o.frequency.setValueAtTime(f,n+t0);g.gain.setValueAtTime(0,n+t0);g.gain.linearRampToValueAtTime(v,n+t0+0.05);g.gain.exponentialRampToValueAtTime(0.0001,n+t0+d);o.connect(g).connect(a.destination);o.start(n+t0);o.stop(n+t0+d+0.05);};
  if(t==='tick')tone(180,0,0.16,0.05,'triangle'); else if(t==='hold')tone(98,0,0.7,0.07,'sine'); else if(t==='bad'){tone(146.83,0,0.6,0.05,'sine');tone(110,0.18,1.0,0.055,'sine');} else if(t==='good'){tone(196,0,0.45,0.06,'sine');tone(261.6,0.16,0.6,0.05,'sine');} else if(t==='donor')tone(330,0,0.3,0.05,'triangle'); }

function Ash(){ const b=useRef(Array.from({length:24}).map(()=>({left:Math.random()*100,dur:9+Math.random()*12,delay:-Math.random()*18,sway:(Math.random()*80-40)+'px',size:2+Math.random()*2.5,op:0.3+Math.random()*0.4})));
  return <div className="ash">{b.current.map((x,i)=><i key={i} style={{left:x.left+'%',width:x.size,height:x.size,opacity:x.op,'--sway':x.sway,animationDuration:x.dur+'s',animationDelay:x.delay+'s'}}></i>)}</div>; }

/* ---- opening content + woodcut crew (CSS bust) ---- */
const IDENTITY=[ {t:'你是莱昂内尔·维尼。',cls:''}, {t:'瘟疫之前,你有挚友、有妻儿、有一整个未来。',cls:''}, {t:'如今,你只想护住还握在手里的人。',cls:'accent'} ];
const CREW=[
  {key:'idris',name:'伊德丽丝',tag:'你的妻子',line:'她的眼里,只剩孩子的安危。',rim:'oklch(0.66 0.07 70 / 0.45)',silTop:'oklch(0.3 0.025 70)',detail:'pony'},
  {key:'clara',name:'克拉拉',tag:'雷蒙德的遗女',line:'她还不懂,大人为何不再说话。',rim:'oklch(0.6 0.06 30 / 0.5)',silTop:'oklch(0.27 0.02 55)',detail:'cross'},
  {key:'adrian',name:'阿德里安',tag:'病弱的挚友',line:'他咳嗽的样子,你不敢多看。',rim:'oklch(0.6 0.06 200 / 0.4)',silTop:'oklch(0.22 0.02 240)',detail:'hood',suspense:true},
];
function Bust({c}){ return (<div className="bust" style={{'--rim':c.rim,'--silTop':c.silTop}}><div className="glow"></div>{c.detail==='pony'&&<div className="ponytail"></div>}<div className="sil"></div><div className="head"></div>{c.detail==='pony'&&<div className="hair"></div>}<div className="rim"></div>{c.detail==='hood'&&<React.Fragment><div className="hood"></div><div className="faceshadow"></div></React.Fragment>}{c.detail==='cross'&&<div className="cross"></div>}{c.suspense&&<div className="mark"></div>}</div>); }

/* ---- 人物图鉴:正文人名 → 可点链接;弹窗显示背景+关系 ---- */
const ALIASES = G.aliases || {};
const CODEX = G.codex || {};
const CNAMES = Object.keys(CODEX).concat(Object.keys(ALIASES)).sort((a,b)=>b.length-a.length);
function esc(s){ return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'); }
const CNAME_RE = CNAMES.length ? new RegExp('('+CNAMES.map(esc).join('|')+')','g') : null;
function linkify(text,onName){
  if(!text||!CNAME_RE) return text;
  const out=[]; let last=0,m; CNAME_RE.lastIndex=0;
  while((m=CNAME_RE.exec(text))){ if(m.index>last) out.push(text.slice(last,m.index)); const nm=m[0], key=ALIASES[nm]||nm;
    out.push(<span className="char-link" key={m.index+'-'+nm} onClick={(e)=>{e.stopPropagation();onName(key);}}>{nm}</span>); last=m.index+nm.length; }
  if(last<text.length) out.push(text.slice(last));
  return out;
}
function CodexModal({ck,onSel,onClose}){
  if(ck==='__list__'){
    return (<React.Fragment><div className="codex-scrim" onClick={onClose}></div>
      <div className="codex-card"><div className="cc-rel-h">出场人物</div>
        <div className="cast-list">{Object.keys(CODEX).map(k=><button key={k} onClick={()=>onSel(k)}>{k}<span>{CODEX[k].tag}</span></button>)}</div>
        <button className="cc-close" onClick={onClose}>关闭</button></div></React.Fragment>);
  }
  const c=CODEX[ck]; if(!c) return null;
  return (<React.Fragment><div className="codex-scrim" onClick={onClose}></div>
    <div className="codex-card">
      <div className="cc-top">{c.bust&&<Bust c={c.bust}/>}<div><div className="cc-name">{ck}</div><div className="cc-tag">{c.tag}</div></div></div>
      <div className="cc-bg">{c.bg}</div>
      {c.rel&&c.rel.length>0&&<React.Fragment><div className="cc-rel-h">关系</div>
        <div className="cc-rel">{c.rel.map((r,i)=><button key={i} onClick={()=>onSel(r[0])}>{r[0]}<b>{r[1]}</b></button>)}</div></React.Fragment>}
      <button className="cc-close" onClick={onClose}>关闭</button>
    </div></React.Fragment>);
}

function ResBar({res,deltas,show}){
  return <div className={`resbar ${show?'show':''}`}>{G.res_def.map(r=>{ const v=res[r.id]; return (
    <div key={r.id} className={`res ${r.id}`}><span className="ic">{r.ic}</span><div className="col"><span className="rl">{r.label}</span>
    <div className="seg">{Array.from({length:10}).map((_,i)=><span key={i} className={i<v?'on':''}></span>)}</div></div>
    {deltas&&deltas[r.id]!=null&&deltas[r.id]!==0&&<span className={`delta ${deltas[r.id]>0?'up':'down'}`}>{deltas[r.id]>0?'+':''}{deltas[r.id]}</span>}</div>);})}</div>;
}

function App(){
  const [phase,setPhase]=useState('opening'); // opening | play | ending
  const [lineN,setLineN]=useState(0); const [idN,setIdN]=useState(0); const [crewN,setCrewN]=useState(0); const [ostep,setOstep]=useState(0);
  const [gs,setGs]=useState(null);
  const [reveal,setReveal]=useState(null); // {choice, info, phase:'hold'|'show', followed, donorBet}
  const [deltas,setDeltas]=useState({});
  const [flash,setFlash]=useState(null); const [shake,setShake]=useState(false);
  const [donorMsg,setDonorMsg]=useState(null);
  const [muted,setMuted]=useState(false);
  const [codexK,setCodexK]=useState(null);
  const [journal,setJournal]=useState([]); const [met,setMet]=useState({}); const [jrnOpen,setJrnOpen]=useState(false);
  const [sceneIn,setSceneIn]=useState(false);
  const fc=useRef(false); const firstInteract=()=>{ if(!fc.current){fc.current=true;drone();} };

  // opening: world -> identity -> crew (auto-reveal per substep)
  useEffect(()=>{ if(phase!=='opening'||ostep!==0)return; if(lineN<G.worldLines.length){ const t=setTimeout(()=>{setLineN(n=>n+1);sfx('tick');}, lineN===0?800:1900); return()=>clearTimeout(t);} },[phase,ostep,lineN]);
  useEffect(()=>{ if(phase!=='opening'||ostep!==1)return; if(idN<IDENTITY.length){ const t=setTimeout(()=>{setIdN(n=>n+1);sfx('tick');}, idN===0?500:1700); return()=>clearTimeout(t);} },[phase,ostep,idN]);
  useEffect(()=>{ if(phase!=='opening'||ostep!==2)return; if(crewN<CREW.length){ const t=setTimeout(()=>{setCrewN(n=>n+1);sfx('tick');}, crewN===0?400:850); return()=>clearTimeout(t);} },[phase,ostep,crewN]);
  useEffect(()=>{ if(phase!=='play'||!gs){ return; } setSceneIn(false); const t=setTimeout(()=>setSceneIn(true),40);
    const nd=E.getNode(G,gs); const txt=(nd.title||'')+'｜'+(nd.desc||'');
    setMet(prev=>{ const m={...prev}; Object.keys(CODEX).forEach(k=>{ if(txt.indexOf(k)>=0) m[k]=true; }); Object.keys(ALIASES).forEach(a=>{ if(txt.indexOf(a)>=0) m[ALIASES[a]]=true; }); return m; });
    return()=>clearTimeout(t); },[phase, gs&&gs.node]);

  const startGame=()=>{ firstInteract(); setGs(E.newGame(G)); setPhase('play'); };
  const node = gs ? E.getNode(G,gs) : null;
  const aud = useMemo(()=> node?audienceVote(node):null, [gs&&gs.node]);

  const pick=(choice)=>{
    if(reveal) return; firstInteract();
    const followed = aud && choice.id===aud.favId;
    const tone = choiceTone(choice);
    const audienceResonance = (tone==='bad'); // 多数押"凶",凶则共鸣(简化)
    const donorBet = choice.risk ? {good:30,bad:70} : {good:50,bad:50};
    const out = E.choose(G, gs, choice.id, { followedAudience:followed, audienceResonance });
    setReveal({choice, out, phase:'hold', tone, followed, donorBet}); sfx('hold');
    setTimeout(()=> setReveal(r=> r?{...r,phase:'show'}:r), 1100);
    setTimeout(()=>{
      const d={}; choice.costs.forEach(c=>{d[c.res]=c.d;});
      if(followed||audienceResonance) d.morale=(d.morale||0)+ (followed?1:0)+(audienceResonance?1:0);
      setReveal(r=> r?{...r,nums:true}:r);
      if(out.reveal&&out.reveal.donor){ const dn=out.reveal.donor; setDonorMsg(`🎁 观众金主打赏 · ${G.res_def.find(x=>x.id===dn.res).cn} +${dn.d}`); sfx('donor'); setTimeout(()=>setDonorMsg(null),2400); }
      if(tone==='good'){ setFlash('good'); sfx('good'); } else { setFlash('bad'); setShake(true); sfx('bad'); }
      setTimeout(()=>{ setFlash(null); setShake(false); },1100);
    },2200);
  };
  const cont=()=>{ const out=reveal.out; const nd=E.getNode(G,gs); const ch=reveal.choice;
    setJournal(j=>[...j,{step:gs.steps+1,nodeTitle:nd.title,choice:ch.label,outcome:ch.outcome.title}]);
    setReveal(null); setGs(out.state); if(out.state.status!=='playing'){ setTimeout(()=>setPhase('ending'),60);} };
  const replay=()=>{ setGs(null); setLineN(0); setIdN(0); setCrewN(0); setOstep(0); setPhase('opening'); setReveal(null); setFlash(null); setJournal([]); setMet({}); setJrnOpen(false); setCodexK(null); };
  const toggleMute=()=>{ const m=!muted; setMuted(m); setMute(m); };

  const progress = gs ? Math.round(100*(gs.steps)/(G.campaign.length)) : (phase==='opening'?6:0);

  return (
    <div className={`world ${shake?'shake':''}`}>
      <div className="horizon"></div><Ash/><div className="grain"></div><div className="vignette"></div>

      {/* danmu (audience presence) */}
      {phase==='play' && <div className="danmu">{[0,1,2].map(i=>{ const txt=DANMU[(gs.steps*3+i)%DANMU.length]; return <span key={gs.steps+'-'+i} style={{top:(i*0)+'px',animationDuration:(11+i*4)+'s',animationDelay:(i*3)+'s'}}>{txt}</span>;})}</div>}

      <div className="stage">
        <div className="topbar">
          <div className="topleft">
            {gs && <button className="idchip" onClick={()=>setCodexK('莱昂内尔')}><span className="idwho">你</span><span className="idname">莱昂内尔·维尼</span></button>}
            <div className={`daystamp show`}><span className="d-plague">PLAGUE</span><span className="d-num">幕 <b>{gs?gs.steps+1:1}</b>/{G.campaign.length}</span></div>
          </div>
          {gs && <ResBar res={gs.res} deltas={reveal&&reveal.nums?deltas:null} show={true}/>}
        </div>

        <div className={`center ${phase==='play'?'choice-mode':''}`}>
          {phase==='opening' && (
            <div className="phase">
              {ostep===0 && <React.Fragment>
                <div className="world-lines">{G.worldLines.map((l,i)=><div key={i} className={`wline ${l.cls} ${i<lineN?'in':''}`}>{l.t}</div>)}</div>
                {lineN>=G.worldLines.length && <button className="start-btn" onClick={()=>{firstInteract();setOstep(1);}}>▸ 继续</button>}
              </React.Fragment>}

              {ostep===1 && <React.Fragment>
                <div className="world-lines">{IDENTITY.map((l,i)=><div key={i} className={`wline ${l.cls} ${i<idN?'in':''}`}>{l.t}</div>)}</div>
                {idN>=IDENTITY.length && <button className="start-btn" onClick={()=>setOstep(2)}>▸ 你身后还有谁</button>}
              </React.Fragment>}

              {ostep===2 && <React.Fragment>
                <div className="crew-intro">— 高墙之内,你还守着这三个人 —</div>
                <div className="crew-row">{CREW.map((c,i)=>(
                  <div key={c.key} className={`survivor ${c.suspense?'suspense':''} ${i<crewN?'in':''}`}>
                    <Bust c={c}/><div className="s-name">{c.name}</div><div className="s-tag">{c.tag}</div><div className="s-line"><b>{c.line}</b></div>
                  </div>))}</div>
                {crewN>=CREW.length && <button className="start-btn" onClick={()=>setOstep(3)}>▸ 该上路了</button>}
              </React.Fragment>}

              {ostep===3 && <React.Fragment>
                <div className="world-lines" style={{marginBottom:18}}><div className="wline in">撑下去,只靠这三样。</div></div>
                <div className="pillars">
                  <div className="pillar food"><div className="pe">🥫</div><div className="pn">食物</div><div className="pm">见底,就会饿死</div></div>
                  <div className="pillar health"><div className="pe">💊</div><div className="pn">健康</div><div className="pm">归零,就会病倒</div></div>
                  <div className="pillar morale"><div className="pe">🔥</div><div className="pn">士气</div><div className="pm">耗尽,就撑不下去</div></div>
                </div>
                <div className="desc" style={{maxWidth:460}}>每个选择都有代价,任一耗尽,你便走到了头。<br/><span style={{color:'var(--cyan)'}}>看你直播的人,会投票、会打赏、与你共担这一局。</span></div>
                <button className="start-btn" onClick={startGame}>进入幸存 ▸</button>
              </React.Fragment>}
            </div>
          )}

          {phase==='play' && node && (
            <div className="phase">
              <div className="scene-card">
                <div className={`scene-emoji ${sceneIn?'in':''}`}>{node.icon}</div>
                <div className="node-title">{linkify(node.title,setCodexK)}</div>
                <div className="node-chip">{(G.nodeChapter[node.id]||'').replace('PROLOGUE','序章')}</div>
              </div>
              <div className="desc">{linkify(node.desc,setCodexK)}</div>
              <div className="aud-hint">◂ 观众实时投票 · 顺应民意者士气 +1 ▸</div>
              <div className="choice-list">
                {node.choices.map((c,i)=>{ const pc=aud?aud.pct[i]:0; const fav=aud&&c.id===aud.favId; return (
                  <button key={c.id} className={`choice in ${fav?'fav':''}`} onClick={()=>pick(c)}>
                    <span className="c-num">{i+1}</span>
                    <span className="c-body">
                      <span className="c-act">{c.act||c.label}{fav&&<span className="fav-tag">民意</span>}</span>
                      <span className="c-hint">{c.hint}</span>
                      <span className="aud-vote"><span className="aud-bar"><i style={{width:pc+'%'}}></i></span><span className="aud-pct">{pc}%</span></span>
                    </span>
                  </button>);})}
              </div>
            </div>
          )}

          {phase==='ending' && gs && (()=>{ const e=E.ending(G,gs); return (
            <div className="ending">
              <div className="e-title">{e.title}</div>
              <div className="e-sub">{e.body}</div>
              <div className="e-note">— 第 {gs.steps} 幕 · 食{gs.res.food} 健{gs.res.health} 士{gs.res.morale} —</div>
              <button className="e-replay" onClick={replay}>↺ 再活一次</button>
            </div>);})()}
        </div>
      </div>

      {/* reveal */}
      {reveal && (
        <React.Fragment>
          <div className="reveal-scrim"></div>
          <div className={`reveal-box ${reveal.phase==='show'?(reveal.tone==='good'?'good':'bad'):''}`}>
            {reveal.phase==='hold' ? (
              <div className="rv-hold">{reveal.choice.risk?'观众屏息押注':'屏息'}<div className="dots"><i></i><i></i><i></i></div>
                {reveal.choice.risk && <div style={{marginTop:10,fontSize:11,letterSpacing:1,color:'var(--fog-dim)'}}>吉 {reveal.donorBet.good}% · 凶 {reveal.donorBet.bad}%</div>}
              </div>
            ) : (
              <React.Fragment>
                <div className="rv-kicker">结果</div>
                <div className="rv-title">{reveal.choice.outcome.title}</div>
                <div className="rv-body" dangerouslySetInnerHTML={{__html:reveal.choice.outcome.body}}></div>
                {reveal.nums && <div className="rv-deltas">{reveal.choice.costs.map((c,i)=>{const def=G.res_def.find(r=>r.id===c.res);return <span key={i} className={`rv-delta ${c.d>0?'up':'down'}`}>{def.ic} {c.d>0?'+':''}{c.d}</span>;})}</div>}
                {reveal.nums && (reveal.followed||reveal.tone==='bad') && <div className="rv-bonus">{reveal.followed?'＋ 民心所向 士气+1　':''}{reveal.tone==='bad'?'＋ 观众共鸣 士气+1':''}</div>}
                {reveal.nums && reveal.choice.effects && reveal.choice.effects[0] && <div className="rv-foot">{reveal.choice.effects[0]}</div>}
                {reveal.nums && <button className="rv-cont" onClick={cont}>{reveal.out.state.status!=='playing'?'面对结局 ▸':'继续 ▸'}</button>}
              </React.Fragment>
            )}
          </div>
        </React.Fragment>
      )}

      {flash && <div className={`flash ${flash}`}></div>}
      {donorMsg && <div className="donor-toast">{donorMsg}</div>}
      {phase==='play' && <button className="cast-btn" onClick={()=>setCodexK('__list__')}>☰ 人物</button>}
      {codexK && <CodexModal ck={codexK} onSel={setCodexK} onClose={()=>setCodexK(null)}/>}
      {phase==='play' && <button className="jrn-btn" onClick={()=>setJrnOpen(true)}>✎ 手记</button>}
      {jrnOpen && (<React.Fragment>
        <div className="codex-scrim" onClick={()=>setJrnOpen(false)}></div>
        <div className="codex-card">
          <div className="cc-rel-h">我是谁</div>
          <div className="cc-bg" style={{margin:'0 0 16px'}}>你是 <b style={{color:'var(--fog)'}}>莱昂内尔·维尼</b>——{CODEX['莱昂内尔'].tag}。{CODEX['莱昂内尔'].bg}</div>
          <div className="cc-rel-h">已遇见的人</div>
          <div className="cc-rel" style={{marginBottom:16}}>{Object.keys(met).length? Object.keys(met).map(k=><button key={k} onClick={()=>{setJrnOpen(false);setCodexK(k);}}>{k}</button>) : <span className="jrn-empty">尚未遇见旁人</span>}</div>
          <div className="cc-rel-h">历程 · 你的抉择</div>
          <div className="jrn-list">{journal.length? journal.map((e,i)=><div className="jrn-item" key={i}>幕{e.step} · <b>{e.nodeTitle}</b><br/>↳ 你选择 <span className="jc">{e.choice}</span> ⇒ {e.outcome}</div>) : <span className="jrn-empty">还没有做出任何抉择</span>}</div>
          <button className="cc-close" onClick={()=>setJrnOpen(false)}>关闭</button>
        </div></React.Fragment>)}
      <div className="hairline" style={{width:progress+'%'}}></div>
      <button className="mute" onClick={toggleMute} title="环境音">{muted?'🔇':'🔊'}</button>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
