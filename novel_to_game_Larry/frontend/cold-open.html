/* ============================================================

function DoomArtDefs() {

        <filter id="dRough2"><feTurbulence type="fractalNoise" baseFrequency="0.05" numOctaves="2" seed="13" result="n" /><feDisplacementMap in="SourceGraphic" in2="n" scale="5" /></filter>
        <linearGradient id="duskSky" x1="0" y1="0" x2="0" y2="1">

}

}

/* 参数化木刻肖像(body × trait × emblem × eyes)— 源自 design-ref/doom-art.jsx */
const PORTRAIT_BODY = {
  tall:  { sx: 'M8 150 L13 106 Q22 86 50 80 L82 80 Q110 86 119 108 L124 150 Z', hx: 64, hy: 54, rx: 25, ry: 27 },
  mid:   { sx: 'M12 150 L17 112 Q25 92 50 88 L84 88 Q110 96 117 116 L122 150 Z', hx: 64, hy: 58, rx: 24, ry: 26 },
  small: { sx: 'M22 150 L27 116 Q34 100 52 97 L80 97 Q98 101 104 120 L109 150 Z', hx: 64, hy: 62, rx: 21, ry: 23 },
};
function portraitSVG(r) {
  const B = PORTRAIT_BODY[r.body || 'mid'];
  const rim = r.rim || 'oklch(0.74 0.05 220)';
  const bg = r.bg || rim;
  const isHood = r.trait === 'hood';
  let p = `<defs><radialGradient id="pg_${r.id}" cx="0.5" cy="0.4" r="0.62"><stop offset="0" stop-color="${bg}" stop-opacity="0.3"/><stop offset="1" stop-color="${bg}" stop-opacity="0"/></radialGradient></defs>`;
  p += `<rect width="132" height="150" fill="url(#pg_${r.id})"/>`;
  p += `<g filter="url(#dRough2)" fill="#14110d"><path d="${B.sx}"/>`;
  if (!isHood) p += `<ellipse cx="${B.hx}" cy="${B.hy}" rx="${B.rx}" ry="${B.ry}"/>`;
  p += `</g>`;
  if (r.trait === 'glasses') {
    p += `<g fill="none" stroke="${rim}" stroke-width="2.3" opacity="0.72"><circle cx="${B.hx - 10}" cy="${B.hy + 2}" r="8"/><circle cx="${B.hx + 10}" cy="${B.hy + 2}" r="8"/><path d="M${B.hx - 2.5} ${B.hy + 2} H${B.hx + 2.5}"/></g>`;
  } else if (r.trait === 'ponytail') {
    p += `<g filter="url(#dRough2)" fill="#14110d"><path d="M${B.hx + 16} ${B.hy - 16} Q${B.hx + 36} ${B.hy - 18} ${B.hx + 32} ${B.hy + 8} Q${B.hx + 28} ${B.hy + 22} ${B.hx + 16} ${B.hy + 16} Z"/></g>`;
  } else if (r.trait === 'cap') {
    p += `<g filter="url(#dRough2)" fill="#14110d"><path d="M${B.hx - 26} ${B.hy - 10} Q${B.hx} ${B.hy - 30} ${B.hx + 26} ${B.hy - 10} L${B.hx + 32} ${B.hy - 4} L${B.hx - 22} ${B.hy - 4} Z"/></g>`;
  } else if (r.trait === 'scarf') {
    p += `<g filter="url(#dRough2)" fill="#14110d"><path d="M${B.hx - 24} ${B.hy + B.ry - 2} Q${B.hx} ${B.hy + B.ry + 12} ${B.hx + 24} ${B.hy + B.ry - 2} L${B.hx + 20} ${B.hy + B.ry + 14} L${B.hx - 20} ${B.hy + B.ry + 14} Z"/></g>`;
  } else if (isHood) {
    p += `<g filter="url(#dRough)" fill="#120f0c"><path d="M${B.hx - 38} ${B.hy + 46} Q${B.hx - 42} ${B.hy - 22} ${B.hx} ${B.hy - 26} Q${B.hx + 42} ${B.hy - 22} ${B.hx + 38} ${B.hy + 46} Q${B.hx + 30} ${B.hy + 2} ${B.hx} ${B.hy + 6} Q${B.hx - 30} ${B.hy + 2} ${B.hx - 38} ${B.hy + 46} Z"/></g>`;
    p += `<path d="M${B.hx - 24} ${B.hy + 8} Q${B.hx - 20} ${B.hy + 32} ${B.hx} ${B.hy + 38} Q${B.hx + 20} ${B.hy + 32} ${B.hx + 24} ${B.hy + 10} Q${B.hx + 14} ${B.hy + 24} ${B.hx} ${B.hy + 26} Q${B.hx - 14} ${B.hy + 24} ${B.hx - 24} ${B.hy + 8} Z" fill="#0a0807"/>`;
  }
  if (!isHood) p += `<path d="M${B.hx - B.rx + 2} ${B.hy - 8} Q${B.hx - B.rx - 2} ${B.hy + 8} ${B.hx - B.rx + 6} ${B.hy + 22}" stroke="${rim}" stroke-width="2.4" fill="none" opacity="0.4"/>`;
  const em = r.emblem || {};
  if (em.type === 'cross') p += `<g transform="translate(${B.hx},122)" filter="url(#dRough2)"><rect x="-3.2" y="-9" width="6.4" height="18" fill="${em.color}"/><rect x="-9" y="-3.2" width="18" height="6.4" fill="${em.color}"/></g>`;
  else if (em.type === 'strap') p += `<path d="M${B.hx - 14} 96 L${B.hx + 8} 150" stroke="#0c0a07" stroke-width="8" stroke-linecap="round" opacity="0.9"/><circle cx="${B.hx - 2}" cy="120" r="3.4" fill="${em.color}" opacity="0.85"/>`;
  else if (em.type === 'armband') p += `<rect x="${B.hx + 12}" y="102" width="22" height="9" rx="2" fill="${em.color}" opacity="0.85" transform="rotate(22 ${B.hx + 22} 106)"/>`;
  else if (em.type === 'mark') p += `<ellipse cx="${B.hx + 22}" cy="100" rx="9" ry="6" fill="${em.color}" opacity="0.45" filter="url(#dRough2)"/>`;
  if (isHood && r.eyes) p += `<circle cx="${B.hx - 7}" cy="${B.hy + 18}" r="1.7" fill="${r.eyes}" opacity="0.5"/><circle cx="${B.hx + 8}" cy="${B.hy + 18}" r="1.7" fill="${r.eyes}" opacity="0.5"/>`;
  return p;
}
function SurvivorPortrait({ recipe }) {
  const r = recipe;
  return (
    <div className={`portrait portrait-${r.id}`}>
      <svg viewBox="0 0 132 150" dangerouslySetInnerHTML={{ __html: portraitSVG(r) }}></svg>
      <div className="portrait-hatch"></div>
    </div>
  );
}

/* ============================================================
   环境音 + 音效(WebAudio,自包含)
   ============================================================ */
let _ac, _drone;
function ensureAudio() { if (_ac) return _ac; try { _ac = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {} return _ac; }
function startDrone() {
  const ac = ensureAudio(); if (!ac || _drone) return;
  const o1 = ac.createOscillator(), o2 = ac.createOscillator(), g = ac.createGain();
  o1.type = 'sine'; o1.frequency.value = 55; o2.type = 'sine'; o2.frequency.value = 82.5;
  g.gain.value = 0; o1.connect(g); o2.connect(g); g.connect(ac.destination);
  o1.start(); o2.start(); g.gain.linearRampToValueAtTime(0.05, ac.currentTime + 3);
  _drone = { g, ac };
}
function setMute(m) { if (_drone) _drone.g.gain.linearRampToValueAtTime(m ? 0 : 0.05, _drone.ac.currentTime + 0.4); }
function sfx(type) {
  const ac = ensureAudio(); if (!ac) return; if (ac.state === 'suspended') ac.resume();
  const now = ac.currentTime;
  const tone = (f, t0, dur, vol, wave) => {
    const o = ac.createOscillator(), g = ac.createGain();
    o.type = wave || 'sine'; o.frequency.setValueAtTime(f, now + t0);
    g.gain.setValueAtTime(0, now + t0); g.gain.linearRampToValueAtTime(vol, now + t0 + 0.05);
    g.gain.exponentialRampToValueAtTime(0.0001, now + t0 + dur);
    o.connect(g).connect(ac.destination); o.start(now + t0); o.stop(now + t0 + dur + 0.05);
  };
  if (type === 'tick') tone(180, 0, 0.16, 0.05, 'triangle');
  else if (type === 'hold') tone(98, 0, 0.7, 0.07, 'sine');
  // 柔和版"吉凶":低沉、缓起的两声正弦下行,代替原先刺耳的锯齿 buzz
  else if (type === 'bad') { tone(146.83, 0, 0.6, 0.05, 'sine'); tone(110, 0.18, 1.0, 0.055, 'sine'); }
  else if (type === 'good') { tone(196, 0, 0.45, 0.06, 'sine'); tone(261.6, 0.16, 0.6, 0.05, 'sine'); }
}

/* ============================================================ */
function Ash() {
  const bits = useRef(Array.from({ length: 26 }).map(() => ({
    left: Math.random() * 100, dur: 9 + Math.random() * 12, delay: -Math.random() * 18,
    sway: (Math.random() * 80 - 40) + 'px', size: 2 + Math.random() * 2.5, op: 0.3 + Math.random() * 0.4,
  })));
  return (
    <div className="ash">
      {bits.current.map((b, i) => (
        <i key={i} style={{ left: b.left + '%', width: b.size, height: b.size, opacity: b.op,
          '--sway': b.sway, animationDuration: b.dur + 's', animationDelay: b.delay + 's' }}></i>
      ))}
    </div>
  );
}

function ResBar({ values, deltas, show }) {
  return (
    <div className={`resbar ${show ? 'show' : ''}`}>
      {RES_DEF.map(r => {
        const v = values[r.id];
        return (
          <div key={r.id} className={`res ${r.id}`}>
            <span className="ic">{r.ic}</span>
            <div className="col">
              <span className="rl">{r.label}</span>
              <div className="seg">{Array.from({ length: 10 }).map((_, i) => <span key={i} className={i < v ? 'on' : ''}></span>)}</div>
            </div>
            {deltas[r.id] != null && deltas[r.id] !== 0 && (
              <span className={`delta ${deltas[r.id] > 0 ? 'up' : 'down'}`}>{deltas[r.id] > 0 ? '+' : ''}{deltas[r.id]}</span>
            )}
          </div>
        );
      })}
    </div>
  );
}

function App() {
  const [phase, setPhase] = useState('world');
  const [lineN, setLineN] = useState(0);
  const [sitN, setSitN] = useState(0);
  const [crewN, setCrewN] = useState(0);
  const [choicesIn, setChoicesIn] = useState(false);
  const [resShow, setResShow] = useState(false);
  const [dayShow, setDayShow] = useState(false);
  const [values, setValues] = useState(START_RES);
  const [deltas, setDeltas] = useState({});
  const [reveal, setReveal] = useState(null);
  const [flash, setFlash] = useState(null);
  const [shake, setShake] = useState(false);
  const [muted, setMuted] = useState(false);
  const [hairline, setHairline] = useState(8);
  const [sceneShow, setSceneShow] = useState(false);

  const firstClick = useRef(false);
  const onFirstInteract = () => { if (!firstClick.current) { firstClick.current = true; startDrone(); } };

  useEffect(() => {
    if (phase !== 'world') return;
    setTimeout(() => setDayShow(true), 600);
    if (lineN < WORLD_LINES.length) {
      const t = setTimeout(() => { setLineN(n => n + 1); sfx('tick'); }, lineN === 0 ? 900 : 2100);
      return () => clearTimeout(t);
    }
  }, [phase, lineN]);

  const worldAdvance = () => { onFirstInteract(); if (lineN < WORLD_LINES.length) setLineN(WORLD_LINES.length); else goCrew(); };
  const goCrew = () => { setPhase('crew'); setHairline(36); setTimeout(() => setResShow(true), 1400); };

  useEffect(() => {
    if (phase !== 'crew') return;
    if (crewN < CREW.length) {
      const t = setTimeout(() => { setCrewN(n => n + 1); sfx('tick'); }, crewN === 0 ? 500 : 900);
      return () => clearTimeout(t);
    }
  }, [phase, crewN]);

  const goChoice = () => { onFirstInteract(); setPhase('choice'); setHairline(64); setResShow(true); };

  useEffect(() => {
    if (phase !== 'choice') return;
    if (sitN < SITUATION.length) {
      const t = setTimeout(() => { setSitN(n => n + 1); sfx('tick'); }, sitN === 0 ? 500 : 1500);
      return () => clearTimeout(t);
    } else if (!choicesIn) {
      const t = setTimeout(() => setChoicesIn(true), 500);
      return () => clearTimeout(t);
    }
  }, [phase, sitN]);

  // 抉择场景插画淡入
  useEffect(() => {
    if (phase === 'choice') { const t = setTimeout(() => setSceneShow(true), 60); return () => clearTimeout(t); }
    setSceneShow(false);
  }, [phase]);

  const skipToChoice = () => {
    onFirstInteract(); setPhase('choice'); setResShow(true); setDayShow(true);
    setSitN(SITUATION.length); setChoicesIn(true); setHairline(64);
  };

  const pick = (choice) => {
    if (reveal) return;
    onFirstInteract();
    const net = choice.costs.reduce((s, c) => s + c.d, 0);
    const good = net > 0 && choice.tone === 'good';
    setHairline(100);
    setReveal({ phase: 'hold', choice }); sfx('hold');
    setTimeout(() => setReveal({ phase: 'show', choice, nums: false }), 1100);
    setTimeout(() => {
      const d = {}; choice.costs.forEach(c => { d[c.res] = c.d; });
      setDeltas(d);
      setValues(prev => { const n = { ...prev }; choice.costs.forEach(c => { n[c.res] = Math.max(0, Math.min(10, n[c.res] + c.d)); }); return n; });
      setReveal(r => r ? { ...r, nums: true } : r);
      if (good) { setFlash('good'); sfx('good'); } else { setFlash('bad'); setShake(true); sfx('bad'); }
      setTimeout(() => { setFlash(null); setShake(false); setDeltas({}); }, 1100);
    }, 2200);
  };

  const goEnding = () => { setReveal(null); setPhase('ending'); };
  const replay = () => {
    setPhase('world'); setLineN(0); setSitN(0); setCrewN(0); setChoicesIn(false);
    setResShow(false); setValues(START_RES); setDeltas({}); setReveal(null); setFlash(null); setHairline(8); setSceneShow(false);
  };
  const toggleMute = () => { const m = !muted; setMuted(m); setMute(m); };

  return (
    <div className={`world ${shake ? 'shake' : ''}`}>
      <DoomArtDefs />
      <div className="horizon"></div>
      {phase === 'world' && <DoomScene name="windsorDusk" className={`world-scene ${dayShow ? 'show' : ''}`} />}
      {phase === 'choice' && <DoomScene name="derelictHut" className={`choice-scene ${sceneShow ? 'show' : ''}`} />}
      <Ash />
      <div className="grain"></div>
      <div className="vignette"></div>

      {phase === 'world' && <div className="tap-zone" onClick={worldAdvance}></div>}

      <div className="stage">
        <div className="topbar">
          <div className={`daystamp ${dayShow ? 'show' : ''}`}>
            <span className="d-plague">PLAGUE</span>
            <span className="d-num">DAY <b>{DAY}</b></span>
          </div>
          <ResBar values={values} deltas={deltas} show={resShow} />
        </div>

        <div className={`center ${phase === 'choice' ? 'choice-mode' : ''}`}>
          {phase === 'world' && (
            <div className="phase">
              <div className="world-lines">
                {WORLD_LINES.map((l, i) => (
                  <div key={i} className={`wline ${l.cls} ${i < lineN ? 'in' : ''} ${lineN >= WORLD_LINES.length && i < WORLD_LINES.length - 1 ? 'dim' : ''}`}>{l.t}</div>
                ))}
              </div>
              <div className={`advance-hint ${lineN >= WORLD_LINES.length ? 'show' : ''}`} onClick={worldAdvance}>▸ 继续</div>
            </div>
          )}

          {phase === 'crew' && (
            <div className="phase">
              <div className="crew-intro">— 高墙之内,你还守着这三个人 —</div>
              <div className="crew-row">
                {CREW.map((c, i) => (
                  <div key={c.key} className={`survivor ${c.suspense ? 'suspense' : ''} ${i < crewN ? 'in' : ''}`} style={{ transitionDelay: (i * 0.04) + 's' }}>
                    <SurvivorPortrait recipe={c.recipe} />
                    <div className="s-name">{c.name}</div>
                    <div className="s-tag">{c.tag}</div>
                    <div className="s-line">{c.line.map((ln, k) => <div key={k}>{k === c.line.length - 1 ? <b>{ln}</b> : ln}</div>)}</div>
                  </div>
                ))}
              </div>
              <button className={`continue ${crewN >= CREW.length ? 'in' : ''}`} onClick={goChoice}>往前走 ▸</button>
            </div>
          )}

          {phase === 'choice' && (
            <div className="phase">
              <div className="situation">
                {SITUATION.map((s, i) => (
                  <div key={i} className={`sit-line ${s.cls} ${i < sitN ? 'in' : ''}`}>{s.t}</div>
                ))}
              </div>
              <div className="choice-list">
                {CHOICES.map((c, i) => (
                  <button key={c.id} className={`choice ${choicesIn ? 'in' : ''}`} style={{ transitionDelay: (i * 0.12) + 's' }} onClick={() => pick(c)}>
                    <span className="c-num">{c.num}</span>
                    <span className="c-body">
                      <span className="c-act">{c.act}</span>
                      <span className="c-hint">{c.hint}</span>
                    </span>
                    <span className="c-arrow">▸</span>
                  </button>
                ))}
              </div>
            </div>
          )}

          {phase === 'ending' && (
            <div className="ending">
              <div className="e-title">最 后 的 人</div>
              <div className="e-sub">这只是瘟疫之年的一个清晨。<br />你能在温莎的高墙里撑过多少个这样的清晨,取决于接下来每一个抉择。</div>
              <div className="e-note">— 冷开场到此 · 《最后的人》正式游戏在此接入 —</div>
              <button className="e-replay" onClick={replay}>↺ 重看开场</button>
            </div>
          )}
        </div>
      </div>

      {reveal && (
        <React.Fragment>
          <div className="reveal-scrim"></div>
          <div className={`reveal-box ${reveal.phase === 'show' ? (reveal.choice.tone === 'good' ? 'good' : 'bad') : ''}`}>
            {reveal.phase === 'hold' ? (
              <div className="rv-hold">屏息<div className="dots"><i></i><i></i><i></i></div></div>
            ) : (
              <React.Fragment>
                <div className="rv-kicker">结果</div>
                <div className="rv-title">{reveal.choice.title}</div>
                <div className="rv-body" dangerouslySetInnerHTML={{ __html: reveal.choice.body }}></div>
                {reveal.nums && (
                  <div className="rv-deltas">
                    {reveal.choice.costs.map((c, i) => {
                      const def = RES_DEF.find(r => r.id === c.res);
                      return <span key={i} className={`rv-delta ${c.d > 0 ? 'up' : 'down'}`}>{def.ic} {c.d > 0 ? '+' : ''}{c.d}</span>;
                    })}
                  </div>
                )}
                {reveal.nums && <div className="rv-foot">{reveal.choice.foot}</div>}
                {reveal.nums && <button className="rv-cont" onClick={goEnding}>故事继续 ▸</button>}
              </React.Fragment>
            )}
          </div>
        </React.Fragment>
      )}

      {flash && <div className={`flash ${flash}`}></div>}

      <div className="hairline" style={{ width: hairline + '%' }}></div>
      {(phase === 'world' || phase === 'crew') && <button className="skip" onClick={skipToChoice}>跳过 ⏩</button>}
      <button className="mute" onClick={toggleMute} title="环境音">{muted ? '🔇' : '🔊'}</button>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
