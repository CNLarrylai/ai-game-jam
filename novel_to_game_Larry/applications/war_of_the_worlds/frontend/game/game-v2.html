<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>世界大战 · 末日生存直播间 v2</title>
<link rel="stylesheet" href="../doom.css" />
<style>
  /* ============ 直播间布局 (70/30) ============ */
  html,body{height:100%;}
  .live{position:fixed;inset:0;display:flex;overflow:hidden;}
  .live-main{flex:1 1 70%;position:relative;overflow:hidden;display:flex;flex-direction:column;min-width:0;}
  .live-chat{flex:0 0 30%;max-width:420px;min-width:300px;display:flex;flex-direction:column;
    background:linear-gradient(180deg, oklch(0.16 0.014 250 / 0.92), oklch(0.12 0.012 250 / 0.96));
    border-left:1px solid var(--line-soft);backdrop-filter:blur(3px);z-index:6;}

  /* ============ 顶部常驻状态栏 ============ */
  .hud{position:relative;z-index:7;display:flex;align-items:center;gap:18px;flex-wrap:wrap;
    padding:10px 18px;border-bottom:1px solid var(--line-soft);
    background:linear-gradient(180deg, oklch(0.14 0.014 250 / 0.85), transparent);}
  .hud-journey{display:flex;flex-direction:column;gap:2px;cursor:pointer;}
  .hj-leg{font-family:var(--f-stamp);font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--ember);}
  .hj-place{font-family:var(--f-serif);font-weight:600;font-size:15px;color:var(--fog);letter-spacing:1px;}
  .hud-stats{display:flex;gap:14px;flex:1;justify-content:flex-end;flex-wrap:wrap;}
  .stat{display:flex;align-items:center;gap:7px;position:relative;}
  .stat .ic{font-size:17px;line-height:1;}
  .stat .col{display:flex;flex-direction:column;gap:3px;}
  .stat .sl{font-family:var(--f-stamp);font-size:8px;letter-spacing:1.5px;text-transform:uppercase;color:var(--fog-dim);}
  .stat .seg{display:flex;gap:2px;}
  .stat .seg span{width:6px;height:9px;border-radius:1px;background:oklch(0.3 0.015 250);}
  .stat.life .seg span.on{background:var(--rust);}
  .stat.supply .seg span.on{background:var(--wheat);}
  .stat.sanity .seg span.on{background:var(--cyan);}
  .stat.concealment .seg span.on{background:var(--toxic);}
  .stat .delta{position:absolute;right:-4px;top:-12px;font-family:var(--f-stamp);font-size:11px;font-weight:700;animation:floatd 1.4s ease forwards;}
  .stat .delta.up{color:oklch(0.8 0.16 145);} .stat .delta.down{color:oklch(0.68 0.18 25);}
  @keyframes floatd{0%{opacity:0;transform:translateY(6px);}20%{opacity:1;}100%{opacity:0;transform:translateY(-14px);}}

  /* ============ 主舞台 ============ */
  .live-stage{flex:1;overflow-y:auto;position:relative;z-index:5;padding:24px 22px 40px;}
  .v2-scene{max-width:640px;margin:0 auto;display:flex;flex-direction:column;align-items:center;}
  .v2-emoji{font-size:60px;line-height:1;filter:drop-shadow(0 6px 24px oklch(0.05 0.01 250));opacity:0;transform:translateY(10px);transition:opacity .8s ease,transform .8s ease;}
  .v2-emoji.in{opacity:.96;transform:none;}
  .v2-title{font-family:var(--f-serif);font-weight:600;font-size:24px;letter-spacing:1px;color:var(--fog);margin:14px 0 4px;text-align:center;}
  .v2-chip{font-family:var(--f-stamp);font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--fog-dim);}
  .v2-desc{font-family:var(--f-serif);font-size:17px;line-height:1.75;color:var(--fog-soft);text-align:center;max-width:600px;margin:18px auto 18px;}

  /* 观众建议(被采纳的创意落地) */
  .aud-suggestion{margin:0 auto 16px;max-width:560px;display:flex;gap:11px;align-items:flex-start;
    background:linear-gradient(180deg, oklch(0.22 0.04 80 / 0.3), oklch(0.18 0.03 80 / 0.18));
    border:1px solid oklch(0.55 0.1 80 / 0.5);border-radius:12px;padding:12px 15px;
    animation:adoptglow 1.2s ease;}
  @keyframes adoptglow{0%{box-shadow:0 0 0 0 oklch(0.8 0.14 80 / 0.6);}100%{box-shadow:0 0 0 14px oklch(0.8 0.14 80 / 0);}}
  .aud-suggestion .as-spark{font-size:18px;}
  .aud-suggestion .as-body{flex:1;}
  .aud-suggestion .as-who{font-family:var(--f-stamp);font-size:10px;letter-spacing:1px;color:oklch(0.82 0.13 80);text-transform:uppercase;}
  .aud-suggestion .as-text{font-family:var(--f-serif);font-size:14px;line-height:1.6;color:var(--fog-soft);margin-top:3px;}
  .aud-suggestion .as-tag{font-family:var(--f-stamp);font-size:9px;letter-spacing:1px;color:oklch(0.85 0.13 80);margin-top:5px;display:inline-block;}

  /* 征集创意倒计时窗口 */
  .call-creative{max-width:560px;margin:0 auto 16px;display:flex;align-items:center;gap:14px;
    background:linear-gradient(180deg, oklch(0.2 0.02 250 / 0.5), oklch(0.16 0.018 250 / 0.4));
    border:1px solid var(--line-soft);border-radius:12px;padding:11px 16px;}
  .cc-ring{position:relative;width:42px;height:42px;flex:none;}
  .cc-ring svg{transform:rotate(-90deg);}
  .cc-ring .cc-n{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    font-family:var(--f-stamp);font-size:13px;font-weight:700;color:var(--cyan);}
  .cc-info{flex:1;}
  .cc-info .cc-h{font-family:var(--f-stamp);font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--cyan-deep);}
  .cc-info .cc-d{font-family:var(--f-serif);font-size:13.5px;color:var(--fog-soft);margin-top:2px;}
  .cc-skip{font-family:var(--f-stamp);font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--fog-dim);
    background:transparent;border:1px solid var(--line-soft);border-radius:7px;padding:7px 12px;cursor:pointer;}
  .cc-skip:hover{color:var(--fog);border-color:var(--line);}

  .v2-aud-hint{text-align:center;font-family:var(--f-stamp);font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--cyan-deep);margin-bottom:12px;opacity:.8;}
  .v2-choices{max-width:560px;margin:0 auto;display:flex;flex-direction:column;gap:11px;}
  .v2-choice{display:flex;gap:13px;align-items:flex-start;text-align:left;width:100%;cursor:pointer;
    background:linear-gradient(180deg, var(--panel), var(--panel-2));border:1px solid var(--line-soft);
    border-radius:12px;padding:14px 16px;transition:border-color .2s,transform .1s;}
  .v2-choice:hover{border-color:var(--ember);transform:translateX(2px);}
  .v2-choice.fav{box-shadow:inset 3px 0 0 var(--cyan);}
  .v2-choice .c-num{font-family:var(--f-stamp);font-size:13px;color:var(--fog-dim);border:1px solid var(--line-soft);border-radius:6px;width:24px;height:24px;display:flex;align-items:center;justify-content:center;flex:none;}
  .v2-choice .c-body{flex:1;}
  .v2-choice .c-act{font-family:var(--f-serif);font-size:15.5px;color:var(--fog);display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .v2-choice .c-hint{font-family:var(--f-sans);font-size:12.5px;color:var(--fog-dim);line-height:1.5;margin-top:4px;display:block;}
  .fav-tag{font-family:var(--f-stamp);font-size:9px;letter-spacing:1px;color:var(--cyan);border:1px solid var(--cyan-deep);border-radius:5px;padding:2px 5px;}
  .v2-vote{display:flex;align-items:center;gap:8px;margin-top:8px;}
  .v2-bar{flex:1;height:4px;border-radius:2px;background:oklch(0.3 0.015 250);overflow:hidden;}
  .v2-bar i{display:block;height:100%;background:linear-gradient(90deg,var(--cyan-deep),var(--cyan));transition:width .6s ease;}
  .v2-pct{font-family:var(--f-stamp);font-size:10px;color:var(--fog-dim);min-width:30px;text-align:right;}

  /* ============ 直播评论区 ============ */
  .chat-head{display:flex;align-items:center;gap:11px;padding:13px 15px;border-bottom:1px solid var(--line-soft);}
  .chat-ava{width:40px;height:40px;border-radius:50%;flex:none;overflow:hidden;border:1px solid var(--line);
    background:radial-gradient(circle at 50% 38%, oklch(0.4 0.04 50), oklch(0.18 0.02 250));position:relative;}
  .chat-ava::after{content:"";position:absolute;left:50%;top:30%;width:14px;height:14px;border-radius:50%;transform:translateX(-50%);background:oklch(0.6 0.04 50);}
  .chat-ava::before{content:"";position:absolute;left:50%;bottom:0;width:26px;height:16px;border-radius:13px 13px 0 0;transform:translateX(-50%);background:oklch(0.32 0.03 250);}
  .chat-who{flex:1;}
  .chat-name{font-family:var(--f-serif);font-weight:600;font-size:15px;color:var(--fog);letter-spacing:.5px;}
  .chat-live{display:flex;align-items:center;gap:6px;margin-top:3px;}
  .live-dot{width:7px;height:7px;border-radius:50%;background:oklch(0.62 0.2 25);box-shadow:0 0 8px oklch(0.62 0.2 25);animation:pulse 1.6s infinite;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}
  .chat-online{font-family:var(--f-stamp);font-size:10px;letter-spacing:1px;color:var(--fog-dim);}
  .chat-online b{color:var(--fog-soft);}

  .chat-stream{flex:1;overflow-y:auto;padding:12px 14px;display:flex;flex-direction:column;gap:9px;scroll-behavior:smooth;}
  .cmt{font-family:var(--f-sans);font-size:13px;line-height:1.45;opacity:0;animation:cmtin .4s ease forwards;}
  @keyframes cmtin{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
  .cmt .cu{font-weight:600;color:oklch(0.7 0.07 50);margin-right:6px;}
  .cmt .ct{color:var(--fog-soft);}
  .cmt.mine .cu{color:var(--cyan);}
  .cmt.adopted{background:linear-gradient(90deg, oklch(0.28 0.06 80 / 0.4), transparent);
    border-left:2px solid oklch(0.8 0.13 80);border-radius:0 8px 8px 0;padding:7px 9px;
    box-shadow:0 0 18px oklch(0.7 0.12 80 / 0.25);}
  .cmt.adopted .cu{color:oklch(0.85 0.13 80);}
  .cmt .adopt-badge{display:inline-block;margin-top:4px;font-family:var(--f-stamp);font-size:9px;letter-spacing:1px;color:oklch(0.85 0.13 80);}
  .cmt.sys{font-family:var(--f-stamp);font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--cyan-deep);text-align:center;opacity:.7;}
  .cmt.poll{background:oklch(0.2 0.02 250 / 0.5);border:1px solid var(--line-soft);border-radius:9px;padding:9px 11px;}
  .cmt.poll .pq{font-family:var(--f-serif);font-size:12.5px;color:var(--fog);margin-bottom:6px;}
  .cmt.poll .po{display:flex;align-items:center;gap:7px;margin-top:4px;}
  .cmt.poll .po-l{font-family:var(--f-sans);font-size:11.5px;color:var(--fog-soft);flex:1;}
  .cmt.poll .po-b{width:70px;height:4px;border-radius:2px;background:oklch(0.3 0.015 250);overflow:hidden;}
  .cmt.poll .po-b i{display:block;height:100%;background:linear-gradient(90deg,var(--cyan-deep),var(--cyan));}
  .cmt.poll .po-p{font-family:var(--f-stamp);font-size:9px;color:var(--fog-dim);min-width:26px;text-align:right;}

  .chat-input{display:flex;gap:8px;padding:11px 13px;border-top:1px solid var(--line-soft);flex-direction:column;}
  .chat-guide{font-family:var(--f-stamp);font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--cyan-deep);opacity:.75;text-align:center;}
  .chat-row{display:flex;gap:8px;}
  .chat-row input{flex:1;font-family:var(--f-sans);font-size:13px;color:var(--fog);background:oklch(0.12 0.012 250);
    border:1px solid var(--line-soft);border-radius:9px;padding:9px 12px;outline:none;}
  .chat-row input:focus{border-color:var(--cyan-deep);}
  .chat-row button{font-family:var(--f-stamp);font-size:11px;letter-spacing:1px;color:var(--cyan);
    background:transparent;border:1px solid var(--cyan-deep);border-radius:9px;padding:0 14px;cursor:pointer;}
  .chat-row button:hover{background:oklch(0.25 0.04 220 / 0.3);}

  /* ============ 公屏横幅(从左滑入) ============ */
  .pub-banner{position:absolute;left:0;top:64px;z-index:20;max-width:80%;
    background:linear-gradient(90deg, oklch(0.26 0.06 80 / 0.95), oklch(0.2 0.04 80 / 0.6));
    border:1px solid oklch(0.6 0.12 80 / 0.6);border-left:3px solid oklch(0.85 0.13 80);
    border-radius:0 12px 12px 0;padding:11px 20px 11px 16px;
    font-family:var(--f-serif);font-size:14px;color:oklch(0.92 0.06 85);letter-spacing:.5px;
    box-shadow:0 14px 40px -16px oklch(0.05 0.02 80);animation:banin 3s ease forwards;}
  @keyframes banin{0%{transform:translateX(-110%);opacity:0;}10%,72%{transform:translateX(0);opacity:1;}100%{transform:translateX(0);opacity:0;}}
  .pub-banner b{color:oklch(0.88 0.13 80);}

  /* 画面光圈/微光 */
  .aura{position:absolute;inset:0;z-index:4;pointer-events:none;background:radial-gradient(circle at 50% 45%, oklch(0.8 0.13 80 / 0.18), transparent 55%);animation:aurafade 2.2s ease forwards;}
  @keyframes aurafade{0%{opacity:0;}25%{opacity:1;}100%{opacity:0;}}

  /* ============ 屏息揭晓(沿用 game.html) ============ */
  .reveal-scrim{position:fixed;inset:0;z-index:28;background:oklch(0.06 0.01 250 / 0.82);backdrop-filter:blur(3px);}
  .reveal-box{position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);z-index:30;width:min(90%,520px);
    background:linear-gradient(180deg,var(--panel),var(--panel-2));border:1px solid var(--line);border-radius:18px;
    padding:30px 30px 26px;box-shadow:0 50px 120px -40px oklch(0.02 0.01 250);text-align:center;}
  .reveal-box.good{border-color:oklch(0.5 0.1 145 / 0.6);}
  .reveal-box.bad{border-color:oklch(0.5 0.14 25 / 0.6);}
  .rv-hold{font-family:var(--f-stamp);font-size:13px;letter-spacing:3px;text-transform:uppercase;color:var(--fog-dim);}
  .rv-hold .dots{display:flex;gap:7px;justify-content:center;margin-top:16px;}
  .rv-hold .dots i{width:8px;height:8px;border-radius:50%;background:var(--fog-dim);animation:bnc 1s infinite;}
  .rv-hold .dots i:nth-child(2){animation-delay:.2s;} .rv-hold .dots i:nth-child(3){animation-delay:.4s;}
  @keyframes bnc{0%,100%{opacity:.3;transform:translateY(0);}50%{opacity:1;transform:translateY(-5px);}}
  .rv-kicker{font-family:var(--f-stamp);font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--ember);}
  .rv-title{font-family:var(--f-serif);font-weight:600;font-size:22px;color:var(--fog);margin:8px 0 12px;letter-spacing:1px;}
  .rv-body{font-family:var(--f-serif);font-size:15.5px;line-height:1.75;color:var(--fog-soft);}
  .rv-deltas{display:flex;gap:14px;justify-content:center;margin-top:18px;flex-wrap:wrap;}
  .rv-delta{font-family:var(--f-stamp);font-size:14px;}
  .rv-delta.up{color:oklch(0.8 0.16 145);} .rv-delta.down{color:oklch(0.68 0.18 25);}
  .rv-bonus{margin-top:10px;font-family:var(--f-stamp);font-size:11px;letter-spacing:1px;color:var(--cyan);}
  .rv-loss{margin-top:10px;font-family:var(--f-stamp);font-size:12px;letter-spacing:1px;color:oklch(0.7 0.16 25);}
  .rv-foot{margin-top:14px;font-family:var(--f-sans);font-size:12px;color:var(--fog-dim);font-style:italic;}
  .rv-cont{margin-top:20px;font-family:var(--f-stamp);font-size:13px;letter-spacing:2px;text-transform:uppercase;color:var(--fog);
    background:transparent;border:1px solid var(--line);border-radius:9px;padding:11px 28px;cursor:pointer;}
  .rv-cont:hover{border-color:var(--ember);color:var(--ember);}

  /* ============ 幕间承接旁白(短过场卡) ============ */
  .il-scrim{position:fixed;inset:0;z-index:24;background:oklch(0.05 0.01 250 / 0.9);backdrop-filter:blur(2px);
    display:flex;align-items:center;justify-content:center;padding:30px;animation:ilfade .5s ease;}
  @keyframes ilfade{from{opacity:0;}to{opacity:1;}}
  .il-card{width:min(92%,560px);text-align:center;}
  .il-kicker{font-family:var(--f-stamp);font-size:10px;letter-spacing:4px;text-transform:uppercase;color:var(--ember);margin-bottom:18px;opacity:0;animation:ilup .8s ease .2s forwards;}
  .il-line{font-family:var(--f-serif);font-size:19px;line-height:1.8;color:var(--fog-soft);letter-spacing:.5px;opacity:0;transform:translateY(8px);animation:ilup 1s ease .5s forwards;}
  @keyframes ilup{to{opacity:.95;transform:none;}}
  .il-rule{width:42px;height:1px;background:var(--line);margin:22px auto 0;opacity:0;animation:ilup .8s ease 1.1s forwards;}
  .il-cont{margin:26px auto 0;display:block;font-family:var(--f-stamp);font-size:12px;letter-spacing:3px;text-transform:uppercase;color:var(--fog-dim);
    background:transparent;border:1px solid var(--line-soft);border-radius:8px;padding:11px 30px;cursor:pointer;opacity:0;animation:ilup .8s ease 1.3s forwards;transition:color .2s,border-color .2s;}
  .il-cont:hover{color:var(--ember);border-color:var(--ember);}

  .flash{position:fixed;inset:0;z-index:26;pointer-events:none;animation:fl .9s ease forwards;}
  .flash.good{background:radial-gradient(circle,oklch(0.6 0.12 145 / 0.18),transparent 60%);}
  .flash.bad{background:radial-gradient(circle,oklch(0.55 0.18 25 / 0.2),transparent 60%);}
  @keyframes fl{0%{opacity:0;}30%{opacity:1;}100%{opacity:0;}}

  /* ============ 开场(沿用分层冷开场) ============ */
  .v2-open{position:absolute;inset:0;z-index:9;display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;padding:30px;overflow-y:auto;}
  .wlines{display:flex;flex-direction:column;gap:14px;max-width:560px;}
  .wline{font-family:var(--f-serif);font-size:19px;line-height:1.6;color:var(--fog-soft);opacity:0;transform:translateY(8px);transition:opacity .9s,transform .9s;}
  .wline.in{opacity:.92;transform:none;}
  .wline.accent{color:var(--ember);} .wline.accent2{color:var(--cyan);}
  .start-btn{margin:32px auto 0;display:block;font-family:var(--f-stamp);font-size:14px;letter-spacing:3px;text-transform:uppercase;
    color:var(--fog);cursor:pointer;background:transparent;border:1px solid var(--line);padding:13px 34px;border-radius:8px;transition:all .25s;}
  .start-btn:hover{border-color:var(--ember);color:var(--ember);background:oklch(0.25 0.03 50 / 0.2);}
  .crew-intro{font-family:var(--f-stamp);font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--fog-dim);margin-bottom:20px;}
  .crew-row{display:flex;gap:26px;justify-content:center;flex-wrap:wrap;}
  .survivor{display:flex;flex-direction:column;align-items:center;width:150px;opacity:0;transform:translateY(10px);transition:opacity .7s,transform .7s;}
  .survivor.in{opacity:1;transform:none;}
  .s-name{font-family:var(--f-serif);font-weight:600;font-size:16px;color:var(--fog);margin-top:10px;letter-spacing:1px;}
  .s-tag{font-family:var(--f-stamp);font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--ember);margin-top:3px;}
  .s-line{font-family:var(--f-serif);font-size:13px;color:var(--fog-dim);line-height:1.5;margin-top:8px;font-style:italic;}
  .pillars{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;margin:4px 0 22px;}
  .pillar{width:150px;background:linear-gradient(180deg,var(--panel),var(--panel-2));border:1px solid var(--line-soft);border-radius:12px;padding:16px 12px;text-align:center;}
  .pillar .pe{font-size:30px;line-height:1;}
  .pillar .pn{font-family:var(--f-serif);font-weight:600;font-size:16px;margin:8px 0 4px;letter-spacing:1px;color:var(--fog);}
  .pillar .pm{font-family:var(--f-sans);font-size:12px;color:var(--fog-dim);line-height:1.5;}
  .pillar.life .pn{color:var(--rust);} .pillar.supply .pn{color:var(--wheat);} .pillar.sanity .pn{color:var(--cyan);} .pillar.concealment .pn{color:var(--toxic);}

  /* ============ CSS 木刻半身像(沿用 game.html bust) ============ */
  .bust{position:relative;width:84px;height:84px;}
  .bust .glow{position:absolute;inset:-8px;border-radius:50%;background:radial-gradient(circle,var(--rim,oklch(0.5 0.05 60 / 0.4)),transparent 70%);}
  .bust .sil{position:absolute;left:50%;bottom:0;width:64px;height:46px;border-radius:32px 32px 0 0;transform:translateX(-50%);background:linear-gradient(180deg,var(--silTop,oklch(0.3 0.02 60)),oklch(0.14 0.01 250));}

<body>
<div id="root"></div>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="gamedata.js"></script>
<script src="engine.js"></script>
<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useMemo, useCallback } = React;
const G = window.GAME, E = window.Engine;

/* ---------- seeded rng (stable per-node audience numbers) ---------- */
function hash(s){ let h=2166136261; for(let i=0;i<s.length;i++){ h^=s.charCodeAt(i); h=Math.imul(h,16777619);} return h>>>0; }
function rng(seed){ return function(){ seed|=0; seed=seed+0x6D2B79F5|0; let t=Math.imul(seed^seed>>>15,1|seed); t=t+Math.imul(t^t>>>7,61|t)^t; return ((t^t>>>14)>>>0)/4294967296; }; }
function choiceTone(ch){ const net=ch.costs.reduce((a,c)=>a+c.d,0); const bigNeg=ch.costs.some(c=>c.d<=-2); return (net>0 && !bigNeg) ? 'good' : 'bad'; }
function audienceVote(node){
  const r=rng(hash(node.id)); const cs=node.choices;
  const w=cs.map(c=>{ const net=c.costs.reduce((a,x)=>a+x.d,0); return Math.max(0.5, 2+net*0.7+(c.risk?-0.8:0.4)+r()*2); });
  const sum=w.reduce((a,b)=>a+b,0);
  const pct=w.map(x=>Math.round(100*x/sum));
  let fav=0; for(let i=1;i<pct.length;i++) if(pct[i]>pct[fav]) fav=i;
  return { pct, favId: cs[fav].id };
}

/* ---------- 旅程地点 / 程数 (从 world_bible.route 推算,数据在 gamedata) ---------- */
function placeFor(nodeId){ const ch=G.nodeChapter[nodeId]||''; return (G.chapterPlace&&G.chapterPlace[ch])||'流亡途中'; }
function legFor(nodeId){ const ch=G.nodeChapter[nodeId]||''; return (G.chapterLeg&&G.chapterLeg[ch])||0; }
const TOTAL_LEGS = (G.route&&G.route.length)||7;

/* ---------- 幕间承接旁白(治"跳跃"):进入新一程时,先用一两句把上一程和这一程串起来 ----------
   数据在 gamedata.interludes(按章节)。克制末世腔、木刻暗调,把 7 程连成一条逃亡线。 */
function interludeFor(nodeId){ const ch=G.nodeChapter[nodeId]||''; return (G.interludes&&G.interludes[ch])||null; }

/* ---------- 模拟弹幕池 ---------- */
const FAKE_USERS=['霍塞尔的旅人','灰烬里的猫','沃金老约','红草观察员','月下读者','北纬51度','废墟拾荒人','沉默的史官','提灯夜行','泰晤士残灯','余烬未冷','砖缝里的眼','晚钟','逃难第七日','向北的风'];
const AMBIENT=['撑住啊主播…','别出声,坑就在墙外','趴下!热射线','把头压低','理智要崩了','省着点粮','跟着人潮走','这波太险了','信你一次','别回头看','别开那扇门','红草后面藏好','谁还活着举个手','看哭了','往海边逃,有船'];
/* 玩家如果输入,可被"采纳"的创意池(也接收真输入) */
const SEED_IDEAS=[
  '去翻翻那间没被搜过的弃宅,角落可能压着罐头',
  '别走明处,贴着红草丛和篱笆走',
  '雨水泵那边能接到水,但动静别太大',
  '把猎枪留着壮胆,真遇上别开枪',
  '夜里再赶路,白天藏起来睡',
  '绕开人潮,挤进去会被踩死',
];

/* ---------- audio (沿用 game.html) ---------- */
let _ac,_drone;
function ac(){ if(_ac) return _ac; try{_ac=new (window.AudioContext||window.webkitAudioContext)();}catch(e){} return _ac; }
function drone(){ const a=ac(); if(!a||_drone) return; const o1=a.createOscillator(),o2=a.createOscillator(),g=a.createGain(); o1.type='sine';o1.frequency.value=55;o2.type='sine';o2.frequency.value=82.5;g.gain.value=0;o1.connect(g);o2.connect(g);g.connect(a.destination);o1.start();o2.start();g.gain.linearRampToValueAtTime(0.04,a.currentTime+3);_drone={g,a}; }
function setMute(m){ if(_drone) _drone.g.gain.linearRampToValueAtTime(m?0:0.04,_drone.a.currentTime+0.4); }
function sfx(t){ const a=ac(); if(!a) return; if(a.state==='suspended')a.resume(); const n=a.currentTime; const tone=(f,t0,d,v,w)=>{const o=a.createOscillator(),g=a.createGain();o.type=w||'sine';o.frequency.setValueAtTime(f,n+t0);g.gain.setValueAtTime(0,n+t0);g.gain.linearRampToValueAtTime(v,n+t0+0.05);g.gain.exponentialRampToValueAtTime(0.0001,n+t0+d);o.connect(g).connect(a.destination);o.start(n+t0);o.stop(n+t0+d+0.05);};
  if(t==='tick')tone(180,0,0.16,0.05,'triangle'); else if(t==='hold')tone(98,0,0.7,0.07,'sine'); else if(t==='bad'){tone(146.83,0,0.6,0.05,'sine');tone(110,0.18,1.0,0.055,'sine');} else if(t==='good'){tone(196,0,0.45,0.06,'sine');tone(261.6,0.16,0.6,0.05,'sine');} else if(t==='adopt'){tone(392,0,0.3,0.05,'triangle');tone(523.25,0.14,0.4,0.045,'triangle');} }

/* ---------- bust + opening crew (WotW:你一路'带着走'的三样:妻子/理智/人性) ---------- */
const CREW=[
  {key:'wife',name:'妻子',tag:'你的牵挂',line:'再见到她,是你活下去的理由。',rim:'oklch(0.66 0.07 70 / 0.45)',silTop:'oklch(0.3 0.025 70)',detail:'pony'},
  {key:'self',name:'理智',tag:'冷静的头脑',line:'这份冷静,是你最后的防线。',rim:'oklch(0.6 0.07 210 / 0.45)',silTop:'oklch(0.26 0.025 210)'},
  {key:'humanity',name:'人性',tag:'不愿沦为野兽',line:'在被当作害虫的世界里,你还想做个人。',rim:'oklch(0.6 0.05 150 / 0.4)',silTop:'oklch(0.22 0.03 150)',detail:'hood'},
];
function Bust({c}){ return (<div className="bust" style={{'--rim':c.rim,'--silTop':c.silTop}}><div className="glow"></div>{c.detail==='pony'&&<div className="ponytail"></div>}<div className="sil"></div><div className="head"></div>{c.detail==='pony'&&<div className="hair"></div>}<div className="rim"></div>{c.detail==='hood'&&<React.Fragment><div className="hood"></div><div className="faceshadow"></div></React.Fragment>}{c.detail==='cross'&&<div className="cross"></div>}{c.suspense&&<div className="mark"></div>}</div>); }

/* ---------- 人物图鉴 linkify / CodexModal (沿用 game.html) ---------- */
const ALIASES = G.aliases || {};
const CODEX = G.codex || {};
const CNAMES = Object.keys(CODEX).concat(Object.keys(ALIASES)).sort((a,b)=>b.length-a.length);
function esc(s){ return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'); }
const CNAME_RE = CNAMES.length ? new RegExp('('+CNAMES.map(esc).join('|')+')','g') : null;
function linkify(text,onName){
  if(!text||!CNAME_RE) return text;
  const out=[]; let last=0,m; CNAME_RE.lastIndex=0;
  while((m=CNAME_RE.exec(text))){ if(m.index>last) out.push(text.slice(last,m.index)); const nm=m[0], key=ALIASES[nm]||nm;
    out.push(<span className="char-link" key={m.index+'-'+nm} onClick={(e)=>{e.stopPropagation();onName(key);}}>{nm}</span>); last=m.index+nm.length; }
  if(last<text.length) out.push(text.slice(last));
  return out;
}
function CodexModal({ck,onSel,onClose}){
  if(ck==='__list__'){
    return (<React.Fragment><div className="codex-scrim" onClick={onClose}></div>
      <div className="codex-card"><div className="cc-rel-h">出场人物</div>
        <div className="cast-list">{Object.keys(CODEX).map(k=><button key={k} onClick={()=>onSel(k)}>{k}<span>{CODEX[k].tag}</span></button>)}</div>
        <button className="cc-close" onClick={onClose}>关闭</button></div></React.Fragment>);
  }
  const c=CODEX[ck]; if(!c) return null;
  return (<React.Fragment><div className="codex-scrim" onClick={onClose}></div>
    <div className="codex-card">
      <div className="cc-top">{c.bust&&<Bust c={c.bust}/>}<div><div className="cc-name">{ck}</div><div className="cc-tag">{c.tag}</div></div></div>
      <div className="cc-bg">{c.bg}</div>
      {c.rel&&c.rel.length>0&&<React.Fragment><div className="cc-rel-h">关系</div>
        <div className="cc-rel">{c.rel.map((r,i)=><button key={i} onClick={()=>onSel(r[0])}>{r[0]}<b>{r[1]}</b></button>)}</div></React.Fragment>}
      <button className="cc-close" onClick={onClose}>关闭</button>
    </div></React.Fragment>);
}

/* ---------- 顶部状态栏:旅程 + 4维(life/supply/sanity/concealment,从 gamedata.res_def 驱动) ---------- */
const STAT_DEF=G.res_def.map(r=>({id:r.id,ic:r.ic,sl:r.cn,cls:r.id}));
function StatBars({res,deltas}){
  return (<div className="hud-stats">{STAT_DEF.map(s=>{
    const v=res[s.id]; const max=10;
    return (<div key={s.id} className={`stat ${s.cls}`}>
      <span className="ic">{s.ic}</span>
      <div className="col"><span className="sl">{s.sl}</span>
        <div className="seg">{Array.from({length:max}).map((_,i)=><span key={i} className={i<v?'on':''}></span>)}</div>
      </div>
      {deltas&&deltas[s.id]!=null&&deltas[s.id]!==0&&<span className={`delta ${deltas[s.id]>0?'up':'down'}`}>{deltas[s.id]>0?'+':''}{deltas[s.id]}</span>}
    </div>);
  })}</div>);
}

/* ---------- 评论区 ---------- */
function ChatPanel({comments,online,streamRef,onSend}){
  const [draft,setDraft]=useState('');
  const send=()=>{ const t=draft.trim(); if(!t)return; onSend(t); setDraft(''); };
  return (<div className="live-chat">
    <div className="chat-head">
      <div className="chat-ava"></div>
      <div className="chat-who">
        <div className="chat-name">幸存者直播间 · 火星入侵</div>
        <div className="chat-live"><span className="live-dot"></span><span className="chat-online">LIVE · 在线 <b>{online.toLocaleString()}</b></span></div>
      </div>
    </div>
    <div className="chat-stream" ref={streamRef}>
      {comments.map(c=>{
        if(c.kind==='sys') return <div className="cmt sys" key={c.id}>— {c.text} —</div>;
        if(c.kind==='poll') return (<div className="cmt poll" key={c.id}>
          <div className="pq">🗳️ {c.prompt}</div>
          {c.options.map((o,i)=><div className="po" key={i}><span className="po-l">{o.label}</span><span className="po-b"><i style={{width:o.pct+'%'}}></i></span><span className="po-p">{o.pct}%</span></div>)}
        </div>);
        return (<div className={`cmt ${c.mine?'mine':''} ${c.adopted?'adopted':''}`} key={c.id}>
          <span className="cu">{c.user}</span><span className="ct">{c.text}</span>
          {c.adopted&&<div className="adopt-badge">✨ 已融入游戏</div>}
        </div>);
      })}
    </div>
    <div className="chat-input">
      <div className="chat-guide">直播间会回应你的声音</div>
      <div className="chat-row">
        <input value={draft} onChange={e=>setDraft(e.target.value)} onKeyDown={e=>{if(e.key==='Enter')send();}} placeholder="写下你的提议…" maxLength={40}/>
        <button onClick={send}>发送</button>
      </div>
    </div>
  </div>);
}

/* ---------- 倒计时环 ---------- */
function Ring({pct}){ const R=18,C=2*Math.PI*R; return (
  <svg width="42" height="42" viewBox="0 0 42 42">
    <circle cx="21" cy="21" r={R} fill="none" stroke="oklch(0.3 0.015 250)" strokeWidth="3"/>
    <circle cx="21" cy="21" r={R} fill="none" stroke="var(--cyan)" strokeWidth="3" strokeLinecap="round"
      strokeDasharray={C} strokeDashoffset={C*(1-pct)} style={{transition:'stroke-dashoffset 1s linear'}}/>
  </svg>); }

let CMT_ID=0;
function App(){
  const [phase,setPhase]=useState('opening'); // opening | play | ending
  const [ostep,setOstep]=useState(0);
  const [lineN,setLineN]=useState(0); const [crewN,setCrewN]=useState(0);
  const [gs,setGs]=useState(null);
  const [reveal,setReveal]=useState(null);
  const [deltas,setDeltas]=useState({});
  const [flash,setFlash]=useState(null);
  const [muted,setMuted]=useState(false);
  const [codexK,setCodexK]=useState(null);
  const [journal,setJournal]=useState([]); const [met,setMet]=useState({}); const [jrnOpen,setJrnOpen]=useState(false);
  const [sceneIn,setSceneIn]=useState(false);
  // 评论 / 直播
  const [comments,setComments]=useState([]); const [online,setOnline]=useState(1284);
  const [adoptStats,setAdoptStats]=useState({total:0, byUser:{}});
  const [adopted,setAdopted]=useState(null);       // 本幕被采纳的创意(落地展示)
  const [banner,setBanner]=useState(null);          // 公屏横幅
  const [aura,setAura]=useState(false);
  const [interlude,setInterlude]=useState(null);    // 幕间承接旁白(进入新一程的短过场卡)
  const lastChapterRef=useRef(null);
  // 征集创意
  const [callOpen,setCallOpen]=useState(false); const [callPct,setCallPct]=useState(1);
  const CALL_SECS=12;
  const callRef=useRef(null); const streamRef=useRef(null); const candidateRef=useRef([]);
  const adoptedThisNode=useRef(false);
  const fc=useRef(false); const firstInteract=()=>{ if(!fc.current){fc.current=true;drone();} };

  /* push a comment */
  const pushComment=useCallback((c)=>{ setComments(prev=>{ const next=[...prev,{id:++CMT_ID, ...c}]; return next.slice(-60); }); },[]);

  /* 自动滚动到底 */
  useEffect(()=>{ const el=streamRef.current; if(el) el.scrollTop=el.scrollHeight; },[comments]);

  /* 开场分层 */
  useEffect(()=>{ if(phase!=='opening'||ostep!==0)return; if(lineN<G.worldLines.length){ const t=setTimeout(()=>{setLineN(n=>n+1);sfx('tick');}, lineN===0?700:1700); return()=>clearTimeout(t);} },[phase,ostep,lineN]);
  useEffect(()=>{ if(phase!=='opening'||ostep!==1)return; if(crewN<CREW.length){ const t=setTimeout(()=>{setCrewN(n=>n+1);sfx('tick');}, crewN===0?400:850); return()=>clearTimeout(t);} },[phase,ostep,crewN]);

  /* 进入新一幕:幕间承接旁白 + scene-in + met + 评论系统提示 + 投票 + 开启征集 */
  useEffect(()=>{ if(phase!=='play'||!gs){ return; }
    const nd=E.getNode(G,gs); const ch=G.nodeChapter[nd.id]||'';
    adoptedThisNode.current=false; setAdopted(null);
    // 章节切换 → 先放一张短过场卡承接(开局第一程不放,直接入戏)
    const il=interludeFor(nd.id);
    const isNewChapter = ch!==lastChapterRef.current && lastChapterRef.current!==null;
    lastChapterRef.current=ch;
    if(isNewChapter && il){ setInterlude(il); }
    setSceneIn(false); const t=setTimeout(()=>setSceneIn(true),40);
    const txt=(nd.title||'')+'｜'+(nd.desc||'');
    setMet(prev=>{ const m={...prev}; Object.keys(CODEX).forEach(k=>{ if(txt.indexOf(k)>=0) m[k]=true; }); Object.keys(ALIASES).forEach(a=>{ if(txt.indexOf(a)>=0) m[ALIASES[a]]=true; }); return m; });
    pushComment({kind:'sys',text:`第 ${gs.steps+1} 程 · ${placeFor(nd.id)}`});
    // poll 民意:用 interactions.json 的 poll
    const poll=E.pollFor(G,nd.id);
    if(poll){ const r=rng(hash(poll.id)); let a=35+Math.floor(r()*30); const opts=poll.options.map((o,i)=>({label:o, pct: i===0?a:100-a})); pushComment({kind:'poll',prompt:poll.prompt,options:opts}); }
    setCallPct(1); setCallOpen(true);
    return()=>clearTimeout(t); },[phase, gs&&gs.node]);

  /* 弹幕循环:每 ~2.2s 一条 ambient,在线人数轻微波动 */
  useEffect(()=>{ if(phase!=='play')return; const iv=setInterval(()=>{
    const r=Math.random();
    if(callOpen && candidateRef.current.length>0 && r<0.35){
      // 优先冒泡候选创意,让观众看到"投稿"
      const c=candidateRef.current[Math.floor(Math.random()*candidateRef.current.length)];
      pushComment({user:c.user, text:c.text, mine:c.mine});
    } else {
      pushComment({user:FAKE_USERS[Math.floor(Math.random()*FAKE_USERS.length)], text:AMBIENT[Math.floor(Math.random()*AMBIENT.length)]});
    }
    setOnline(o=>Math.max(900, o+Math.floor((Math.random()-0.45)*40)));
  },2200); return()=>clearInterval(iv); },[phase,callOpen]);

  /* 征集倒计时 */
  useEffect(()=>{ if(!callOpen)return; const start=Date.now();
    callRef.current=setInterval(()=>{ const el=(Date.now()-start)/1000; const left=Math.max(0,CALL_SECS-el); setCallPct(left/CALL_SECS);
      if(left<=0){ clearInterval(callRef.current); adoptOne(); } },200);
    return()=>clearInterval(callRef.current);
  },[callOpen, gs&&gs.node]);

  /* 玩家发评论 -> 入流 + 成为候选创意 */
  const onSend=(text)=>{ firstInteract(); const user='你'; pushComment({user,text,mine:true});
    candidateRef.current=[...candidateRef.current,{user,text,mine:true}]; };

  const RES_CN={}; const RES_IC={}; G.res_def.forEach(r=>{RES_CN[r.id]=r.cn;RES_IC[r.id]=r.ic;});
  const effStr=(e)=>{ if(!e) return ''; const p=Object.keys(e).filter(k=>e[k]).map(k=>`${RES_IC[k]||''}${RES_CN[k]||k}${e[k]>0?'+':''}${e[k]}`); return p.length?(' · '+p.join(' ')):''; };
  const genLabel=(g)=>{ if(!g) return ''; if(g.kind==='item') return `🎒 生成道具「${g.data.icon||''}${g.data.name}」${effStr(g.effect)}`; if(g.kind==='npc') return `👤 引来同行者「${g.data.name}」· ${g.data.skill}${effStr(g.effect)}`; return `📜 ${g.data.narration}${effStr(g.effect)}`; };
  // 评论 → 生成真内容(离线池;真引擎就绪后由契约里的 generate() HTTP 分支替换)
  const genFromPool=(comment,seed)=>{ const P=G.generated; if(!P) return null; const r=rng(hash((comment||'')+'|'+seed)); const txt=comment||''; let kind;
    if(/药|粮|水|火|刀|枪|书|物资|罐头|装备|柴|毯|酒|望远镜|红草/.test(txt)) kind='item';
    else if(/人|他|她|同伴|招募|医生|牧师|船|兵|炮兵|老者|母亲|学生/.test(txt)) kind='npc';
    else kind = r()<0.45?'event':(r()<0.5?'item':'npc');
    if(kind==='item' && P.items.length){ const it=P.items[Math.floor(r()*P.items.length)]; return {kind:'item',data:it,effect:it.effect||{}}; }
    if(kind==='npc' && P.npcs.length){ const n=P.npcs[Math.floor(r()*P.npcs.length)]; const eff=/life|生命/.test(n.skill)?{life:1}:/supply|补给/.test(n.skill)?{supply:1}:{sanity:1}; return {kind:'npc',data:n,effect:eff}; }
    const ev=P.events[Math.floor(r()*P.events.length)]; let eff={}; if(ev&&ev.item_gained){ const it=P.items.find(x=>x.name===ev.item_gained); if(it) eff=it.effect||{}; } return {kind:'event',data:ev,effect:eff}; };
  /* 采纳一条创意:落地 + 给当前最低资源 +1 + 三件套反馈 */
  const adoptOne=()=>{
    if(adoptedThisNode.current) return; // 一程只采纳一次,避免倒计时与"立即采纳"重复
    adoptedThisNode.current=true;
    setCallOpen(false);
    // 候选 = 玩家输入(优先) + 种子创意
    let pool=candidateRef.current.slice();
    if(pool.length===0){ const txt=SEED_IDEAS[(gs?gs.steps:0)%SEED_IDEAS.length]; pool=[{user:FAKE_USERS[Math.floor(Math.random()*FAKE_USERS.length)], text:txt, mine:false}]; }
    const pick=pool[pool.length-1]; // 采纳最新一条(玩家若发言则采纳玩家的)
    candidateRef.current=[];
    // 评论 → 生成真内容(离线《最后的人》池;真引擎就绪后由 generate() HTTP 分支替换)
    const gen = genFromPool(pick.text, gs?gs.steps:0);
    if(gen && gen.effect && gs){ setGs(prev=>{ if(!prev) return prev; const r={...prev.res};
      Object.keys(gen.effect).forEach(k=>{ if(r[k]!=null) r[k]=Math.max(0,Math.min(E.TUNING.clampMax, r[k]+gen.effect[k])); }); return {...prev,res:r}; }); }
    setAdopted({user:pick.user, text:pick.text, gen:gen});
    setAdoptStats(s=>{ const by={...s.byUser}; by[pick.user]=(by[pick.user]||0)+1; return {total:s.total+1, byUser:by}; });
    pushComment({user:pick.user, text:pick.text, mine:pick.mine, adopted:true});
    setBanner(`✨ @${pick.user} 的提议生效了!${gen?(gen.kind==='item'?` 生成道具「${gen.data.name}」`:gen.kind==='npc'?` 引来同行者「${gen.data.name}」`:` 触发了一桩事件`):''}`);
    setTimeout(()=>setBanner(null),3200);
    // 画面光圈
    setAura(true); setTimeout(()=>setAura(false),2200);
    sfx('adopt');
  };
  const skipCall=()=>{ if(callRef.current)clearInterval(callRef.current); adoptOne(); };

  const startGame=()=>{ firstInteract(); setGs(E.newGame(G)); setPhase('play');
    setComments([]); setAdoptStats({total:0,byUser:{}}); candidateRef.current=[];
    lastChapterRef.current=null; adoptedThisNode.current=false; setInterlude(null);
    pushComment({kind:'sys',text:'直播开始 · 直播间会回应你的声音'}); };
  const node = gs ? E.getNode(G,gs) : null;
  const aud = useMemo(()=> node?audienceVote(node):null, [gs&&gs.node]);

  const pick=(choice)=>{
    if(reveal) return; firstInteract();
    if(callRef.current)clearInterval(callRef.current); setCallOpen(false);
    const followed = aud && choice.id===aud.favId;
    const tone = choiceTone(choice);
    const audienceResonance = (tone==='bad');
    // 民意真正影响结果:顺应强民意(≥50%)软化该选项最重的负代价+1;逆强民意则理智-1
    let audFx=null; const extraAdjust=[];
    if(aud){ const favIdx=node.choices.findIndex(c=>c.id===aud.favId); const favPct=(aud.pct&&aud.pct[favIdx])||0; const strong=favPct>=50;
      if(strong&&followed){ const neg=choice.costs.filter(c=>c.d<0).slice().sort((a,b)=>a.d-b.d)[0]; if(neg){ extraAdjust.push({res:neg.res,d:1}); audFx={kind:'boon',res:neg.res}; } }
      else if(strong&&!followed){ extraAdjust.push({res:'sanity',d:-1}); audFx={kind:'malus'}; } }
    const out = E.choose(G, gs, choice.id, { followedAudience:followed, audienceResonance, extraAdjust });
    setReveal({choice, out, phase:'hold', tone, followed, audFx}); sfx('hold');
    setTimeout(()=> setReveal(r=> r?{...r,phase:'show'}:r), 1100);
    setTimeout(()=>{
      const d={}; choice.costs.forEach(c=>{d[c.res]=c.d;});
      if(followed||audienceResonance) d.sanity=(d.sanity||0)+(followed?1:0)+(audienceResonance?1:0);
      if(audFx&&audFx.kind==='boon') d[audFx.res]=(d[audFx.res]||0)+1;
      if(audFx&&audFx.kind==='malus') d.sanity=(d.sanity||0)-1;
      setDeltas(d);
      setReveal(r=> r?{...r,nums:true}:r);
      if(tone==='good'){ setFlash('good'); sfx('good'); } else { setFlash('bad'); sfx('bad'); }
      setTimeout(()=>setFlash(null),900);
    },2200);
  };

  const cont=()=>{ const out=reveal.out; const nd=E.getNode(G,gs); const ch=reveal.choice;
    setJournal(j=>[...j,{step:gs.steps+1,nodeTitle:nd.title,place:placeFor(nd.id),choice:ch.label,outcome:ch.outcome.title}]);
    setAdopted(null); setDeltas({});
    setReveal(null);
    setGs(out.state);
    if(out.state.status!=='playing'){ setTimeout(()=>setPhase('ending'),60); }
  };

  const replay=()=>{ setGs(null); setLineN(0); setCrewN(0); setOstep(0); setPhase('opening'); setReveal(null); setFlash(null);
    setJournal([]); setMet({}); setJrnOpen(false); setCodexK(null); setComments([]);
    setAdopted(null); setBanner(null); candidateRef.current=[];
    lastChapterRef.current=null; adoptedThisNode.current=false; setInterlude(null); };
  const toggleMute=()=>{ const m=!muted; setMuted(m); setMute(m); };

  /* 当前住所(随程演变,取自 world_bible.dwelling 的渐进描述) */
  const DWELLINGS=['自家居所 · 随身行囊','借来的单马车','梅伯里空屋','弟弟的逃亡行囊','哈利福德废宅','炮兵的地窖','空城 · 再无住所'];
  const dwellingFor=(nid)=>{ const leg=legFor(nid); return DWELLINGS[Math.max(0,Math.min(DWELLINGS.length-1,leg-1))]||'流亡途中'; };

  return (
    <div className="live">
      {/* ====== 左 70% 游戏画面 ====== */}
      <div className="live-main">
        {/* 顶部常驻状态栏 */}
        <div className="hud">
          <div className="hud-journey" onClick={()=>gs&&setCodexK('叙事者')}>
            <span className="hj-leg">第 {gs?legFor(node.id):1} 程 / 共 {TOTAL_LEGS} · 🏚 {gs?dwellingFor(node.id):'自家居所'}</span>
            <span className="hj-place">{gs?placeFor(node.id):'霍塞尔公地 · 沃金'}</span>
          </div>
          {gs && <StatBars res={gs.res} deltas={reveal&&reveal.nums?deltas:null}/>}
          {phase==='play' && <div className="v2-tools">
            <button className="v2-tool" onClick={()=>setCodexK('__list__')}>☰ 人物</button>
            <button className="v2-tool" onClick={()=>setJrnOpen(true)}>✎ 手记</button>
            <button className="v2-tool" onClick={toggleMute}>{muted?'🔇':'🔊'}</button>
          </div>}
        </div>

        {/* 公屏横幅 */}
        {banner && <div className="pub-banner" dangerouslySetInnerHTML={{__html:banner.replace(/@(\S+)/,'<b>@$1</b>')+' 直播间听见了你。'}}></div>}
        {aura && <div className="aura"></div>}

        {/* ===== 开场 ===== */}
        {phase==='opening' && (
          <div className="v2-open">
            {ostep===0 && <React.Fragment>
              <div className="wlines">{G.worldLines.map((l,i)=><div key={i} className={`wline ${l.cls} ${i<lineN?'in':''}`}>{l.t}</div>)}</div>
              {lineN>=G.worldLines.length && <button className="start-btn" onClick={()=>{firstInteract();setOstep(1);}}>▸ 你身后还有谁</button>}
            </React.Fragment>}
            {ostep===1 && <React.Fragment>
              <div className="crew-intro">— 灾难会逐一夺走这三样,你要带着它们走到尽头 —</div>
              <div className="crew-row">{CREW.map((c,i)=>(
                <div key={c.key} className={`survivor ${i<crewN?'in':''}`}>
                  <Bust c={c}/><div className="s-name">{c.name}</div><div className="s-tag">{c.tag}</div><div className="s-line">{c.line}</div>
                </div>))}</div>
              {crewN>=CREW.length && <button className="start-btn" onClick={()=>setOstep(2)}>▸ 命脉</button>}
            </React.Fragment>}
            {ostep===2 && <React.Fragment>
              <div className="wlines" style={{marginBottom:18}}><div className="wline in">活下去,靠这四样。</div></div>
              <div className="pillars">
                <div className="pillar life"><div className="pe">🩸</div><div className="pn">生命</div><div className="pm">归零,伤重不治</div></div>
                <div className="pillar supply"><div className="pe">🥫</div><div className="pn">补给</div><div className="pm">见底,断给饿殍</div></div>
                <div className="pillar sanity"><div className="pe">🧠</div><div className="pn">理智</div><div className="pm">耗尽,精神崩溃</div></div>
                <div className="pillar concealment"><div className="pe">👁️</div><div className="pn">隐蔽</div><div className="pm">归零,被火星人锁定</div></div>
              </div>
              <div className="v2-desc" style={{maxWidth:480}}>这不是一场能打赢的战争,只能熬过去。<br/><span style={{color:'var(--cyan)'}}>看你直播的人,会投票、会出主意、与你共担这一局。</span></div>
              <button className="start-btn" onClick={startGame}>开播 · 进入幸存 ▸</button>
            </React.Fragment>}
          </div>
        )}

        {/* ===== 主循环 ===== */}
        {phase==='play' && node && (
          <div className="live-stage">
            <div className="v2-scene">
              <div className={`v2-emoji ${sceneIn?'in':''}`}>{node.icon}</div>
              <div className="v2-title">{linkify(node.title,setCodexK)}</div>
              <div className="v2-chip">{placeFor(node.id)} · 🏚 {dwellingFor(node.id)}</div>
            </div>
            <div className="v2-desc">{linkify(node.desc,setCodexK)}</div>

            {/* 被采纳的观众创意(落地展示) */}
            {adopted && <div className="aud-suggestion">
              <span className="as-spark">✨</span>
              <div className="as-body">
                <div className="as-who">@{adopted.user} 的提议生效了</div>
                <div className="as-text">{linkify(adopted.text,setCodexK)}</div>
                <span className="as-tag">{adopted.gen?genLabel(adopted.gen):'观众民意 · 已融入这一程'}</span>
              </div>
            </div>}

            {/* 征集创意倒计时 */}
            {callOpen && !reveal && <div className="call-creative">
              <div className="cc-ring"><Ring pct={callPct}/><div className="cc-n">{Math.ceil(callPct*CALL_SECS)}</div></div>
              <div className="cc-info"><div className="cc-h">📢 征集创意中</div><div className="cc-d">输入你的提议,倒计时结束将采纳一条,落地为这一程的民意。</div></div>
              <button className="cc-skip" onClick={skipCall}>立即采纳</button>
            </div>}

            <div className="v2-aud-hint">◂ 观众实时投票 · 顺应民意者士气 +1 ▸</div>
            <div className="v2-choices">
              {node.choices.map((c,i)=>{ const pc=aud?aud.pct[i]:0; const fav=aud&&c.id===aud.favId; return (
                <button key={c.id} className={`v2-choice ${fav?'fav':''}`} onClick={()=>pick(c)}>
                  <span className="c-num">{i+1}</span>
                  <span className="c-body">
                    <span className="c-act">{c.label}{fav&&<span className="fav-tag">民意</span>}</span>
                    <span className="c-hint">{c.hint}</span>
                    <span className="v2-vote"><span className="v2-bar"><i style={{width:pc+'%'}}></i></span><span className="v2-pct">{pc}%</span></span>
                  </span>
                </button>);})}
            </div>
          </div>
        )}

        {/* ===== 结算 ===== */}
        {phase==='ending' && gs && (()=>{
          let e=E.ending(G,gs);
          const medals=buildLeaderboard(adoptStats);
          return (<div className="live-stage"><div className="v2-end">
            <div className="e-title">{e.title}</div>
            <div className="e-sub">{e.body}</div>
            <div className="e-note">{legFor(node.id)} 程 · 🩸生{gs.res.life} 🥫给{gs.res.supply} 🧠智{gs.res.sanity} 👁️隐{gs.res.concealment}</div>

            <div className="e-sec-h">旅程时间线</div>
            <div className="timeline">{journal.length? journal.map((j,i)=>(
              <div className="tl-item" key={i}>第{j.step}程 · <b>{j.place}</b> — {j.nodeTitle}<br/>↳ 你选择 <span className="tc">{j.choice}</span> ⇒ {j.outcome}{j.loss&&<><br/><span className="tloss">✝ {j.loss}</span></>}</div>
            )) : <div className="jrn-empty">这一局来去匆匆。</div>}</div>

            <div className="e-sec-h">创意排行榜</div>
            <div className="lboard">{medals.map((m,i)=>(
              <div className="lb-row" key={i}><span className="lb-medal">{m.medal}</span>
                <div className="lb-info"><div className="lb-title">{m.title}</div><div className="lb-who">@{m.who}</div><div className="lb-quote">{m.quote}</div></div>
              </div>))}</div>

            <div className="e-stat">本场 <b>{adoptStats.total}</b> 条观众创意影响了这趟逃亡</div>
            <button className="e-replay" onClick={replay}>↺ 再来一局</button>
          </div></div>);
        })()}
      </div>

      {/* ====== 右 30% 评论区 ====== */}
      <ChatPanel comments={comments} online={online} streamRef={streamRef} onSend={onSend}/>

      {/* ===== 屏息揭晓 ===== */}
      {reveal && (<React.Fragment>
        <div className="reveal-scrim"></div>
        <div className={`reveal-box ${reveal.phase==='show'?(reveal.tone==='good'?'good':'bad'):''}`}>
          {reveal.phase==='hold' ? (
            <div className="rv-hold">{reveal.choice.risk?'观众屏息押注':'屏息'}<div className="dots"><i></i><i></i><i></i></div></div>
          ) : (<React.Fragment>
            <div className="rv-kicker">结果</div>
            <div className="rv-title">{reveal.choice.outcome.title}</div>
            <div className="rv-body" dangerouslySetInnerHTML={{__html:reveal.choice.outcome.body}}></div>
            {reveal.nums && <div className="rv-deltas">{reveal.choice.costs.map((c,i)=>{const def=G.res_def.find(r=>r.id===c.res);return <span key={i} className={`rv-delta ${c.d>0?'up':'down'}`}>{def.ic} {c.d>0?'+':''}{c.d}</span>;})}</div>}
            {reveal.nums && (reveal.followed||reveal.tone==='bad') && <div className="rv-bonus">{reveal.followed?'＋ 民心所向 理智+1　':''}{reveal.tone==='bad'?'＋ 观众共鸣 理智+1':''}</div>}
            {reveal.nums && reveal.audFx && reveal.audFx.kind==='boon' && <div className="rv-bonus" style={{color:'var(--cyan)'}}>＋ 观众声援 · {(()=>{const d=G.res_def.find(r=>r.id===reveal.audFx.res);return d?d.cn:reveal.audFx.res;})()}代价减轻 +1</div>}
            {reveal.nums && reveal.audFx && reveal.audFx.kind==='malus' && <div className="rv-bonus" style={{color:'var(--rust)'}}>− 你逆了民意 · 理智 −1</div>}
            {reveal.nums && reveal.choice.effects && reveal.choice.effects[0] && <div className="rv-foot">{reveal.choice.effects[0]}</div>}
            {reveal.nums && <button className="rv-cont" onClick={cont}>{reveal.out.state.status!=='playing'?'面对结局 ▸':'继续 ▸'}</button>}
          </React.Fragment>)}
        </div>
      </React.Fragment>)}

      {flash && <div className={`flash ${flash}`}></div>}

      {/* ===== 幕间承接旁白 ===== */}
      {interlude && phase==='play' && (
        <div className="il-scrim" onClick={()=>setInterlude(null)}>
          <div className="il-card" onClick={e=>e.stopPropagation()}>
            <div className="il-kicker">{node?placeFor(node.id):'流亡途中'}</div>
            <div className="il-line">{linkify(interlude,setCodexK)}</div>
            <div className="il-rule"></div>
            <button className="il-cont" onClick={()=>setInterlude(null)}>继续这一程 ▸</button>
          </div>
        </div>
      )}

      {/* 图鉴 */}
      {codexK && <CodexModal ck={codexK} onSel={setCodexK} onClose={()=>setCodexK(null)}/>}

      {/* 手记 */}
      {jrnOpen && (<React.Fragment>
        <div className="codex-scrim" onClick={()=>setJrnOpen(false)}></div>
        <div className="codex-card">
          <div className="cc-rel-h">我是谁</div>
          <div className="cc-bg" style={{margin:'0 0 16px'}}>你是 <b style={{color:'var(--fog)'}}>那个叙事者</b>——{CODEX['叙事者'].tag}。{CODEX['叙事者'].bg}</div>
          <div className="cc-rel-h">已遇见的人</div>
          <div className="cc-rel" style={{marginBottom:16}}>{Object.keys(met).length? Object.keys(met).map(k=><button key={k} onClick={()=>{setJrnOpen(false);setCodexK(k);}}>{k}</button>) : <span className="jrn-empty">尚未遇见旁人</span>}</div>
          <div className="cc-rel-h">历程 · 你的抉择</div>
          <div className="jrn-list">{journal.length? journal.map((e,i)=><div className="jrn-item" key={i}>第{e.step}程 · <b>{e.nodeTitle}</b><br/>↳ 你选择 <span className="jc">{e.choice}</span> ⇒ {e.outcome}</div>) : <span className="jrn-empty">还没有做出任何抉择</span>}</div>
          <button className="cc-close" onClick={()=>setJrnOpen(false)}>关闭</button>
        </div></React.Fragment>)}
    </div>
  );
}

/* 创意排行榜:用真实采纳统计 + 模拟观众名编排 */
function buildLeaderboard(stats){
  const entries=Object.entries(stats.byUser).sort((a,b)=>b[1]-a[1]);
  const top=entries[0]?entries[0][0]:FAKE_USERS[0];
  const second=entries[1]?entries[1][0]:FAKE_USERS[1];
  return [
    {medal:'🥇',title:'最佳创意官',who:top,quote:`被采纳 ${stats.byUser[top]||1} 次,提议次次落地。`},
    {medal:'🎨',title:'最强脑洞',who:FAKE_USERS[3],quote:'「去翻翻那间没被搜过的弃宅」——果然摸出了罐头。'},
    {medal:'🗳️',title:'最佳指挥',who:second,quote:'每逢抉择都精准押中民意走向。'},
    {medal:'💀',title:'最强搅局',who:FAKE_USERS[8],quote:'「别回头」喊了一路,把全场气氛带崩。'},
  ];
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
